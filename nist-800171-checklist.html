const PLAIN_LANGUAGE = {
  "3.1.1":  { mean:"Only people who are supposed to be in your systems can get in — no open access, no shared logins, no 'everyone can use the admin account.'", looks:"You have a list of who's authorized, each person has their own account, and access is removed when they leave.", steps:["Audit all user accounts — remove anyone who no longer works there","Ensure every person has their own unique login (no shared accounts)","Document who is authorized to access what systems","Set up a process to remove access within 24 hours of employee departure"] },
  "3.1.2":  { mean:"Even authorized users should only be able to do what their job requires — an accountant shouldn't have access to source code.", looks:"User roles and permissions are configured so each person only sees and can do what their job function needs.", steps:["Map out what each role actually needs access to","Review and tighten permissions in your key systems (M365, file shares, etc.)","Remove admin rights from anyone who doesn't specifically need them","Review permissions at least quarterly"] },
  "3.1.3":  { mean:"CUI shouldn't be able to leak from controlled systems to uncontrolled ones — you need guardrails on how data moves.", looks:"File sharing and email are configured to prevent CUI from going to personal email, unapproved cloud storage, or unauthorized parties.", steps:["Identify where your CUI lives and flows (email, file shares, cloud)","Block sending CUI to personal email or unapproved cloud storage","Configure Data Loss Prevention (DLP) rules in your email platform","Train staff on approved channels for sharing CUI"] },
  "3.1.4":  { mean:"Don't let one person control an entire critical process from start to finish — have checks and balances.", looks:"No single employee can both approve and execute a sensitive transaction. The admin who creates accounts isn't the same person who audits them.", steps:["Identify critical processes where one person has unchecked control","Split administrative duties where feasible (account creation vs. access review)","For very small teams, document compensating controls such as manager review of admin actions"] },
  "3.1.5":  { mean:"Every user and account gets only the minimum access needed to do their job — nothing extra, nothing 'just in case.'", looks:"Standard users are not local admins on their own computers. Admin accounts are separate from daily-use accounts.", steps:["Remove local admin rights from standard user accounts","Create separate admin accounts for IT staff — not used for daily tasks","Review and document all privileged accounts","Use role-based access control in key systems"] },
  "3.1.6":  { mean:"IT admins should use a regular account for email and browsing, and only switch to an admin account when doing admin tasks.", looks:"Your IT admin has two accounts: one standard account for daily work, and a separate elevated account only used for system administration.", steps:["Create standard (non-admin) accounts for IT staff to use for email and browsing","Use admin accounts only when performing specific admin tasks","Configure systems so admin accounts cannot browse the internet or receive email"] },
  "3.1.7":  { mean:"Regular users can't do administrator-level things, and when admins do privileged actions, those actions are logged.", looks:"Your systems enforce that only admin accounts can install software or change configs. Audit logs capture privileged actions.", steps:["Confirm standard users cannot install software or change system settings","Enable audit logging for privileged actions (Windows Event Log, AD audit logs)","Review privileged activity logs at least monthly"] },
  "3.1.8":  { mean:"After someone fails to log in too many times, lock the account — this stops automated brute-force password attacks cold.", looks:"After 5–10 failed login attempts, the account locks for 15 minutes or until an admin resets it.", steps:["Configure account lockout policy in Active Directory or your identity provider","Set lockout threshold to 5–10 failed attempts","Set lockout duration to at least 15 minutes","Alert IT on repeated lockouts as a possible attack indicator"] },
  "3.1.9":  { mean:"When someone logs into your systems, they should see a notice telling them the system is for authorized use only and is monitored.", looks:"A login banner appears before authentication on your systems stating use is monitored and unauthorized access is prohibited.", steps:["Configure a login warning banner in Windows via Group Policy","Add a notice to your VPN login page","Add a banner to web-based systems handling CUI","Include CUI handling language in the notice"] },
  "3.1.10": { mean:"Computers and sessions should automatically lock when left unattended so someone walking by can't access them.", looks:"Screens lock automatically after 15 minutes of inactivity. Remote sessions time out after idle periods.", steps:["Set screensaver/lock to activate after 15 minutes via Group Policy","Configure VPN and remote sessions to time out after 30 minutes of inactivity","Train staff to manually lock screens (Win+L) when stepping away"] },
  "3.1.11": { mean:"Remote access sessions should end automatically — don't leave VPN connections and remote desktops open indefinitely.", looks:"VPN sessions have a maximum session length and idle timeout configured. Remote desktop sessions time out.", steps:["Configure VPN maximum session duration (8–12 hours)","Set Remote Desktop idle timeout to 30 minutes","Configure web application session timeouts for anything handling CUI"] },
  "3.1.12": { mean:"When employees access systems remotely, you should have visibility into and control over those sessions.", looks:"All remote access goes through a controlled VPN gateway. You can see who is connected, when, and from where — and can terminate sessions.", steps:["Ensure all remote access routes through your VPN (no direct internet-facing RDP)","Enable logging of VPN connections (who, when, from where)","Verify IT can see active sessions and terminate them","Review remote access logs monthly"] },
  "3.1.13": { mean:"Remote connections must be encrypted so anyone intercepting the traffic cannot read it.", looks:"All remote access uses a FIPS-validated VPN or TLS 1.2+ encrypted connection. No unencrypted RDP is exposed to the internet.", steps:["Confirm your VPN uses AES-256 or equivalent FIPS-validated encryption","Disable TLS 1.0 and 1.1 on all servers","Never expose RDP directly to the internet — require VPN first","Enable HTTPS on all internal web applications"] },
  "3.1.14": { mean:"Remote access must go through a specific, controlled entry point — not directly to individual machines.", looks:"Employees VPN into a gateway, then access internal resources from there. No path exists to bypass the VPN.", steps:["Implement a VPN gateway or zero-trust access solution","Block direct internet access to internal systems (RDP, file shares, etc.)","Require all remote workers to connect via VPN before accessing any internal resource"] },
  "3.1.15": { mean:"Running admin commands remotely requires explicit authorization beyond just having VPN access.", looks:"Remote admin tasks require additional approval or elevation. Privileged remote sessions are separately logged.", steps:["Document which remote administrative functions are permitted","Require separate MFA or approval step for remote privileged access","Log all remote privileged command execution"] },
  "3.1.16": { mean:"Devices connecting to your WiFi need prior authorization — not just anyone who knows the password.", looks:"WiFi uses WPA2-Enterprise (certificate-based) or you maintain a whitelist of approved devices via MDM enrollment or MAC filtering.", steps:["Upgrade WiFi to WPA2-Enterprise if feasible","Alternatively, implement network access control to limit which devices can connect","Separate CUI systems from general-purpose WiFi via VLAN segmentation","Maintain a list of authorized wireless devices"] },
  "3.1.17": { mean:"Your WiFi must be encrypted and require real authentication — WPA3 or WPA2-Enterprise at minimum.", looks:"All access points use WPA3 or WPA2-Enterprise with strong encryption. No open or WEP-encrypted networks exist near CUI systems.", steps:["Verify all access points use WPA3 or WPA2-Enterprise","Eliminate any open or WEP-encrypted networks in the CUI environment","Consider separate SSIDs for CUI devices vs. guests — on separate VLANs"] },
  "3.1.18": { mean:"Phones and tablets accessing company systems need to be managed and enrolled — not uncontrolled personal devices.", looks:"Mobile devices accessing CUI are enrolled in MDM. You can remotely wipe a lost device and enforce security policies.", steps:["Deploy a Mobile Device Management solution (Microsoft Intune, Jamf, etc.)","Require MDM enrollment before allowing mobile access to company email or systems","Configure MDM policies: PIN required, encryption enabled, remote wipe capability","Maintain a list of approved mobile devices"] },
  "3.1.19": { mean:"If CUI can end up on a laptop or phone, that device must use full-disk encryption.", looks:"All laptops have BitLocker (Windows) or FileVault (Mac) enabled. Mobile devices have device encryption confirmed via MDM.", steps:["Enable BitLocker on all Windows laptops via Group Policy (requires TPM — most modern laptops have it)","Enable FileVault on all Mac laptops","Verify mobile devices have encryption enabled via MDM","Store BitLocker recovery keys in Active Directory or Azure AD (not on the encrypted device)"] },
  "3.1.20": { mean:"When your systems connect to outside services — cloud platforms, contractor portals — those connections must be authorized and controlled.", looks:"You have a documented list of approved external connections. Employees can't connect company systems to random cloud services without approval.", steps:["Inventory all external system connections (cloud storage, contractor portals, SaaS tools)","Formally authorize each connection and document it in the SSP","Block connections to unauthorized cloud storage (personal Dropbox, Google Drive)","Review and reauthorize external connections annually"] },
  "3.1.21": { mean:"Company USB drives and external hard drives shouldn't be plugged into systems you don't control — home computers, client sites, etc.", looks:"Policy prohibits using company storage devices on personal or external systems. Technical controls reinforce this.", steps:["Document the policy prohibiting company media use on external systems","Consider enabling device control software to block unauthorized USB devices","Train staff on this requirement","Provide approved encrypted alternatives for necessary data transfers"] },
  "3.1.22": { mean:"If you have a public website or any public-facing system, CUI must never end up there — not accidentally, not temporarily.", looks:"Your public-facing systems have no CUI. A review process exists before anything goes public.", steps:["Review all content on public-facing systems for any CUI right now","Establish an approval process before publishing anything publicly","Train content creators to recognize CUI and keep it off public systems"] },

  "3.2.1":  { mean:"Everyone who handles CUI needs to understand the security risks — not just IT. All staff need annual security awareness training.", looks:"A documented annual security awareness training program exists. Records show all staff completed it with dates.", steps:["Select a training platform (KnowBe4, Proofpoint, or free CISA resources at cisa.gov)","Assign training to all personnel within 30 days of hire and annually thereafter","Track completion with dates and acknowledgment signatures","Include CUI-specific content: what it is, how to mark it, how to protect it"] },
  "3.2.2":  { mean:"People with specific security jobs — IT admins, the compliance officer — need role-specific training beyond general awareness.", looks:"IT admins have technical security training relevant to their role. The compliance lead has CMMC/NIST training. Records exist for both.", steps:["Identify all personnel with specific security responsibilities","Source role-specific training (SANS courses, ISC2, vendor security training)","Document role-based training completion separately from general awareness","Set a recurring schedule — annual minimum"] },
  "3.2.3":  { mean:"Train employees to recognize phishing, social engineering, and insider threat indicators — and to know where to report them.", looks:"Phishing simulation exercises are conducted. All staff know how to report a suspicious email or behavior.", steps:["Run phishing simulations (KnowBe4, GoPhish free tool)","Establish a clear reporting mechanism (e.g., a dedicated security@company.com or IT helpdesk)","Include insider threat recognition in your annual training content","Track and work to improve phishing click rates over time"] },

  "3.3.1":  { mean:"Your systems need to record who did what and when — and retain those records long enough to support an investigation.", looks:"Logging is enabled on servers, workstations, and network devices. Logs are retained for at least 90 days.", steps:["Enable Windows Event Logging on all systems: logon, logoff, account changes, policy changes","Enable logging on network devices: firewall, VPN, switches","Configure log retention to 90 days minimum","Send logs to a central location to prevent local tampering"] },
  "3.3.2":  { mean:"When you look at a log, you need to trace an event back to a specific person — not just to an IP address or shared account.", looks:"All user accounts are unique. Logs capture usernames. Service accounts are named descriptively.", steps:["Eliminate all shared or generic accounts (guest, shared admin passwords)","Ensure service accounts are named and documented","Verify logs include usernames — not just IP addresses","Map each service account to an owning team or system"] },
  "3.3.3":  { mean:"Periodically review what you're logging to make sure you're capturing the right events — logging requirements evolve.", looks:"You have a documented list of what events are logged, and you review that list at least annually.", steps:["Document your current logging configuration","Review against NIST SP 800-92 or CIS Controls logging recommendations","Add any missing critical event types","Update your SSP to reflect the current logging configuration"] },
  "3.3.4":  { mean:"If your logging system stops working, you need to know immediately — a silent logging failure is as bad as no logging at all.", looks:"Monitoring or alerting is configured so that if the logging service stops, an alert fires.", steps:["Configure monitoring for log collection health (most SIEMs have this built in)","Set up alerts if logs stop flowing from critical systems","Test logging failure alerts at least annually","Document the procedure for responding to a logging failure"] },
  "3.3.5":  { mean:"Don't just collect logs — actually analyze them. Look for patterns that indicate something is wrong across multiple systems.", looks:"Logs from multiple systems are correlated and reviewed together via a SIEM or structured manual review process.", steps:["Implement a SIEM or log aggregation tool (Microsoft Sentinel, Splunk, or open-source options)","Create a recurring review procedure — at minimum, weekly review of critical system logs","Define anomaly indicators: multiple failed logins, large transfers, after-hours access","Document findings from every log review session"] },
  "3.3.6":  { mean:"You need to be able to extract useful information from your logs — generate reports, query specific events, produce summaries.", looks:"Your log management tool supports querying and reporting. Standard reports exist and are generated on a schedule.", steps:["Confirm your log tool supports querying and report generation","Create standard reports: failed logins, privileged access, after-hours activity","Schedule periodic report generation and review","Document how logs are accessed and queried"] },
  "3.3.7":  { mean:"All your systems need to agree on the time — otherwise correlating events across systems during an investigation becomes unreliable.", looks:"All servers and workstations sync time from an NTP server. Time is consistent across all systems.", steps:["Configure NTP time synchronization on all servers (Windows: configure W32tm)","Verify workstations sync via domain controller or direct NTP","Use a reliable source: time.nist.gov or pool.ntp.org","Verify time sync is working across all systems"] },
  "3.3.8":  { mean:"Log files are only useful if they haven't been tampered with. An attacker who can delete logs can cover their tracks completely.", looks:"Logs are stored somewhere regular users cannot modify or delete them, ideally forwarded to a separate hardened system.", steps:["Restrict access to log files to IT admins only","Forward logs to a dedicated log server or SIEM separate from production systems","Enable log integrity monitoring where possible","Consider write-once storage for critical audit logs"] },
  "3.3.9":  { mean:"Only specific, trusted admins should be able to configure or manage the logging system itself.", looks:"Access to configure or disable logging is restricted to a designated subset of admins. Changes to logging config are themselves logged.", steps:["Document who has administrative access to your log management system","Restrict log configuration access to the minimum necessary","Ensure changes to logging settings are captured in audit logs","Review logging admin access list quarterly"] },

  "3.4.1":  { mean:"Have a documented 'standard build' for your systems — so you know what a normal configuration looks like and can detect when something has drifted.", looks:"Documented baseline configs exist for workstations, servers, and network devices. New systems are built from these baselines.", steps:["Document baseline configurations for each major system type","Reference CIS Benchmarks for hardening guidance appropriate to your OS versions","Use Group Policy to enforce baselines on Windows systems","Update baselines when systems change and review annually"] },
  "3.4.2":  { mean:"Know what hardware and software you have. You cannot protect what you do not know exists.", looks:"A current inventory of all hardware and software exists, including OS versions and whether each system processes CUI.", steps:["Create an asset inventory (spreadsheet or asset management tool)","Document: device name, type, OS, software, user, CUI designation","Keep it current — update when devices are added or retired","Scan your network to discover any untracked assets (Nmap, firewall device list)"] },
  "3.4.3":  { mean:"When someone changes a system configuration, it needs to be tracked, reviewed, and logged — no undocumented changes.", looks:"A change management process exists. Changes require approval. Every change is documented with what, who, why, and when.", steps:["Implement a change log (even a shared spreadsheet is acceptable to start)","Require all configuration changes to be documented before and after","Review change logs monthly","Consider a ticketing system for change requests as you scale"] },
  "3.4.4":  { mean:"Before making a significant system change, think through whether it could open a new security gap.", looks:"Change requests include a security impact assessment. High-impact changes are reviewed by the ISSO before implementation.", steps:["Add a security impact field to your change management process","Require ISSO review for changes involving: firewall rules, user access, authentication, encryption","Document the security review in your change log","Test changes in a non-production environment when feasible"] },
  "3.4.5":  { mean:"Not everyone should be able to make configuration changes. Define who can change what and enforce it technically.", looks:"Only authorized personnel can make configuration changes. Unauthorized attempts are blocked and logged.", steps:["Document who is authorized to make which types of configuration changes","Implement technical controls to enforce this (restrict admin rights)","Configure audit logging to capture unauthorized change attempts","Review authorization list quarterly"] },
  "3.4.6":  { mean:"Disable or remove anything from your systems that isn't needed for business. Every unnecessary feature is a potential attack surface.", looks:"Systems are stripped down to what is needed. Unnecessary services, ports, and features are disabled.", steps:["Review running services on servers — disable any not required for business","Close unnecessary network ports (run a port scan to find what's open)","Remove or disable unused software and Windows features","Apply CIS Benchmark hardening for your OS versions"] },
  "3.4.7":  { mean:"Specifically restrict high-risk legacy protocols — Telnet, FTP, SMBv1 — and unapproved programs that create unnecessary risk.", looks:"Telnet, FTP, and legacy protocols are disabled. Only approved applications can run on CUI systems.", steps:["Disable Telnet and FTP on all systems (use SSH and SFTP instead)","Block unnecessary ports at the firewall","Consider application whitelisting (Windows Defender Application Control)","Audit installed software and remove anything not business-justified"] },
  "3.4.8":  { mean:"Your default position should be that software is prohibited unless explicitly approved — not allowed unless explicitly blocked.", looks:"An approved software list exists. Users cannot install unapproved software. New software goes through an approval process.", steps:["Create and publish an approved software list","Restrict user ability to install software by removing admin rights","Implement software restriction policies or application control","Define an exception request process for new software"] },
  "3.4.9":  { mean:"Monitor what software gets installed across your environment and intervene when something inappropriate appears.", looks:"Software inventory tools track installed applications. New installations on CUI systems are reviewed. Unapproved software is removed.", steps:["Deploy endpoint management with software inventory (Microsoft Endpoint Manager, etc.)","Configure alerts for new software installations on CUI systems","Conduct quarterly software audits","Remove any software not on the approved list"] },

  "3.5.1":  { mean:"Every user, service, and device needs a unique, documented identity. No anonymous access, no shared accounts.", looks:"Every person has their own account. Every service runs under its own named service account. Devices are identified in your network.", steps:["Audit all accounts — eliminate shared and generic accounts","Document all service accounts and what they're used for","Implement device certificates or MDM enrollment for device identity","Maintain an account inventory in your SSP"] },
  "3.5.2":  { mean:"After identifying who is trying to access a system, you must verify it's really them — through a password, certificate, or other credential.", looks:"All accounts require authentication. No systems allow unauthenticated access. Service accounts use strong, unique credentials.", steps:["Verify no systems allow anonymous or unauthenticated access","Ensure service accounts have strong unique passwords stored in a vault","Implement certificate-based auth for machine accounts where possible","Document all authentication mechanisms in the SSP"] },
  "3.5.3":  { mean:"A password alone is not enough. You need a second factor — an authenticator app, SMS, or hardware token — for remote access and all admin accounts. This is the single highest-impact control for most small businesses.", looks:"Microsoft Authenticator, Duo, or similar is enforced for all remote access and all privileged accounts. There is no bypass.", steps:["Choose an MFA solution: Duo (free up to 10 users), Microsoft Authenticator (included in M365), Google Workspace 2FA","Enable MFA on VPN, M365, and cloud services first — these are your highest-risk entry points","Enforce MFA for all admin accounts with no exceptions","Extend MFA to all user accounts that can access CUI systems"] },
  "3.5.4":  { mean:"Authentication systems should block replayed credentials — an intercepted login shouldn't work a second time.", looks:"Modern authentication protocols (Kerberos, SAML, OAuth) are used. Legacy replay-vulnerable protocols like NTLM and basic auth are disabled.", steps:["Disable NTLM authentication where possible — use Kerberos","Disable basic authentication in Exchange/Office 365","Use modern authentication for all applications","Review and disable legacy auth protocols in Azure AD/Entra if using M365"] },
  "3.5.5":  { mean:"Once a user account is deactivated, don't reassign that username to a new person for a defined retention period.", looks:"Terminated accounts are disabled (not immediately deleted). New accounts get new, unique identifiers. An account reuse policy is documented.", steps:["Set a policy that usernames are not reused for at least 2 years after termination","Disable rather than immediately delete accounts","Delete accounts only after the retention period has passed","Document this policy in your Identification and Authentication Policy"] },
  "3.5.6":  { mean:"Set rules on how long passwords are valid and whether old passwords can be reused — document these rules formally.", looks:"Password history is enforced. Passwords are changed when compromise is suspected. Authenticator management rules are documented.", steps:["Configure password history to remember at least 24 prior passwords","Set policy requiring immediate change if compromise is suspected","Enable 'must change password at next logon' for newly provisioned accounts","Document authenticator rules in the IA Policy"] },
  "3.5.7":  { mean:"Passwords must be long enough and complex enough to resist guessing — length is more important than complexity.", looks:"Minimum 12-character passwords are enforced at the system level, or long passphrases are used.", steps:["Set minimum password length to 12 characters in Group Policy or your identity provider","Enable complexity requirements or encourage passphrases","Screen against known-breached password lists if your IdP supports it (Azure AD/Entra does)","Document password requirements in the IA Policy"] },
  "3.5.8":  { mean:"Users can't cycle through a short list of passwords — enforce a history so old passwords can't be immediately reused.", looks:"Users cannot reuse any of their last 24 passwords. This is enforced at the system level, not just policy.", steps:["Set password history to 24 in Active Directory or your identity provider","Test that the restriction actually works (try reusing a recent password)","Communicate the policy to users","Document in the IA Policy"] },
  "3.5.9":  { mean:"When you issue a temporary password for a new account or a reset, the user must change it immediately.", looks:"Temporary passwords expire after first use or within 24 hours. Users are forced to change on first login.", steps:["Configure 'must change password at next logon' for all new accounts and resets","Set temporary passwords to expire within 24 hours if unused","Confirm this is enforced in your identity provider","Test the process periodically"] },
  "3.5.10": { mean:"Passwords must never be stored in plain text or sent over the network unencrypted — at rest and in transit.", looks:"Passwords are stored as hashed values. Authentication occurs over encrypted connections (HTTPS, LDAPS, Kerberos).", steps:["Verify your identity provider uses modern hashing (major IdPs like AD and Azure AD do this properly)","Disable plain LDAP and use LDAPS for any LDAP connections","Ensure all password reset processes use HTTPS","Never store passwords in plain text files, spreadsheets, or email"] },
  "3.5.11": { mean:"When someone types a password, the screen should show dots or asterisks — never the actual characters.", looks:"All login forms and terminals mask password input. No application displays passwords in clear text during entry.", steps:["Verify all custom or internal web apps mask password input fields","Check terminal and SSH sessions mask password entry","Review any legacy or custom applications for this requirement","Test: type a password in each login interface and verify it is masked"] },

  "3.6.1":  { mean:"You need a documented plan for what to do when something goes wrong — before something goes wrong. Improvising during a breach is too late.", looks:"A written Incident Response Plan exists, roles are assigned, contacts are current, and the plan has been tested.", steps:["Write an Incident Response Plan (the Policy Templates tab in this tool has a full template)","Assign an Incident Response Lead with clear authority","Document contact information: key staff, DoD DIBNet portal, cyber insurance, legal counsel","Conduct a tabletop exercise at least annually"] },
  "3.6.2":  { mean:"When an incident occurs, track everything, document it thoroughly, and report it to DoD within 72 hours if CUI is involved.", looks:"Incident tracking records exist for all events. Significant CUI incidents are reported to DoD via DIBNet within 72 hours per DFARS 252.204-7012.", steps:["Create an incident log template: date, description, severity, actions taken, resolution","Register at dibnet.dod.mil before you need it — don't wait for an incident","Set up an incident tracking system (even a shared spreadsheet works)","Ensure your IR Lead knows the 72-hour reporting deadline cold"] },
  "3.6.3":  { mean:"Run through your incident response plan at least annually so everyone knows their role before a real incident happens.", looks:"Annual tabletop exercises are documented. Lessons learned are incorporated into the plan.", steps:["Schedule an annual tabletop exercise — put it on the calendar now","Pick a realistic scenario: phishing compromise, ransomware, lost laptop with CUI","Walk through the IRP step by step and identify gaps","Document the exercise, findings, and plan updates"] },

  "3.7.1":  { mean:"Systems need regular maintenance — patching, firmware updates, hardware servicing — and every maintenance activity must be documented.", looks:"A maintenance schedule exists. Every activity is logged: date, what was done, who did it, systems affected.", steps:["Create a maintenance schedule: monthly patching, quarterly firmware checks, annual hardware review","Log every maintenance activity with all required details","Retain maintenance logs for at least 3 years","Include maintenance tracking in your change management process"] },
  "3.7.2":  { mean:"Maintenance personnel — especially outside vendors — need to be controlled and authorized. You must know who is touching your systems and why.", looks:"Maintenance personnel are verified before they touch systems. External vendors are escorted. Maintenance tools are approved.", steps:["Document approved internal personnel and authorized external vendors","Escort all external maintenance personnel at all times","Inspect tools brought by outside technicians before use on your systems","Require vendors to sign NDAs and security agreements"] },
  "3.7.3":  { mean:"If a system or drive leaves your facility for repair, remove or protect CUI before it goes — the repair shop is not authorized for CUI.", looks:"Media is sanitized before equipment goes off-site for repair. If sanitization isn't possible, the risk is documented and a reputable NDA-covered vendor is used.", steps:["Implement a procedure for sanitizing equipment before off-site repair","If drives can't be sanitized (failed drive), use a reputable destruction vendor under NDA","Request certificates of sanitization from repair vendors","Track all equipment that leaves the facility"] },
  "3.7.4":  { mean:"When a technician brings a USB drive or diagnostic tool to service your systems, scan it for malware before it touches anything.", looks:"All external media used for maintenance is scanned before use. Policy requires this check.", steps:["Establish a procedure to scan all external media before use on company systems","Use an isolated dedicated workstation for scanning external media","Document the scan requirement in both the Maintenance and Media Protection policies","Train staff to enforce this requirement with outside technicians"] },
  "3.7.5":  { mean:"When your IT vendor or staff logs in remotely to do maintenance, that connection must require MFA.", looks:"All remote maintenance connections use MFA. VPN and vendor remote support tools both require a second factor.", steps:["Ensure your VPN requires MFA for all remote maintenance sessions","Require MFA for vendor remote support tools (TeamViewer, ConnectWise, etc.)","Document this requirement in vendor contracts and your Maintenance Policy","Verify MFA is enforced by testing a remote maintenance login"] },
  "3.7.6":  { mean:"If a maintenance person is not authorized for CUI access, someone who is must supervise them the entire time.", looks:"Authorized staff escort and supervise any maintenance personnel who lack CUI authorization.", steps:["Identify which vendors and technicians do not have CUI access authorization","Assign a designated escort for each maintenance visit","Brief escorts on their specific responsibilities","Log escort supervision in maintenance records"] },

  "3.8.1":  { mean:"USB drives, hard drives, printed documents — anything that contains CUI needs physical protection.", looks:"CUI media is stored in locked cabinets or restricted areas when not in use. Digital media is encrypted.", steps:["Identify all media types that contain or could contain CUI","Store physical CUI media in locked cabinets when not in use","Encrypt all digital media containing CUI (BitLocker, FileVault)","Restrict physical access to media storage areas"] },
  "3.8.2":  { mean:"Not everyone should be able to access CUI stored on media — apply access controls the same as you would to a file share.", looks:"Access controls are applied to CUI directories and encrypted drives. Only authorized people can open or use CUI media.", steps:["Apply file-level permissions to all CUI directories and network shares","Encrypt portable CUI media with access limited to authorized users","Audit who has access to CUI shares quarterly","Remove access promptly when no longer needed"] },
  "3.8.3":  { mean:"When you retire a drive or device, wipe it properly before discarding or redeploying — a deleted file is not erased.", looks:"Drives are wiped using NIST SP 800-88 approved methods or physically destroyed before disposal. Destruction certificates are retained.", steps:["Implement a sanitization procedure: use DBAN, manufacturer secure erase, or physical destruction","For physically failed drives, use a certified destruction vendor","Keep certificates of destruction from all vendors","Never donate, sell, or discard equipment without confirmed sanitization"] },
  "3.8.4":  { mean:"Label physical media and documents that contain CUI with the appropriate CUI marking so everyone knows what they're handling.", looks:"USB drives with CUI have CUI labels. Printed CUI documents have CUI headers and footers. Labels indicate handling requirements.", steps:["Obtain CUI label stickers for portable physical media","Add automatic CUI footer/header to Word document templates","Train staff on CUI marking requirements","Reference the CUI Registry at archives.gov/cui for specific marking guidance"] },
  "3.8.5":  { mean:"Physically control who can get to CUI media — lock it up and keep a record of access.", looks:"Media storage areas are locked. Access is logged. Unauthorized removal of media would be detected.", steps:["Store CUI media in locked cabinets with access logs","Implement a media checkout/check-in log for portable media","Consider a safe for highest-sensitivity media","Review access logs monthly"] },
  "3.8.6":  { mean:"When CUI travels — by email, file transfer, or physical shipment — it must be encrypted or otherwise protected in transit.", looks:"CUI sent via email uses email encryption. CUI on portable media is encrypted. Physical shipments use tamper-evident packaging.", steps:["Enable email encryption for CUI (Microsoft Purview, Proofpoint, etc.)","Require BitLocker or VeraCrypt encryption on any USB drive with CUI","For physical shipment, use tamper-evident packaging and tracked carriers","Document approved CUI transport methods in the Media Protection Policy"] },
  "3.8.7":  { mean:"Limit or technically block the use of unauthorized USB drives and removable media on your systems.", looks:"Device control software blocks unauthorized USB devices. Approved USB devices are encrypted. Usage is logged.", steps:["Implement device control to block unauthorized USB devices (Microsoft Defender for Endpoint, etc.)","Create an approved USB device list","Require encryption on all approved removable media","Log removable media usage on CUI systems"] },
  "3.8.8":  { mean:"Don't plug in any USB drive you found, received unexpectedly, or can't verify — this is one of the oldest and most effective attack techniques.", looks:"Policy explicitly prohibits unknown removable media. Staff know to report and quarantine any found or suspicious media.", steps:["Document the policy: never plug in a USB drive of unknown origin","Train staff: a found USB drive could be a cyberweapon — report it, don't use it","Implement technical controls to block unauthorized devices","Establish a procedure for handling found or suspicious media"] },
  "3.8.9":  { mean:"Backups contain all your CUI too — protect backup storage with the same rigor you apply to your primary systems.", looks:"Backups are encrypted. Backup storage has access controls. Physical backup media is stored securely.", steps:["Enable encryption on all backup solutions (most modern tools support this)","Apply access controls to backup repositories — not everyone should be able to restore CUI","Store physical backup media in a locked, secure location","Test backup restoration periodically and verify data integrity"] },

  "3.9.1":  { mean:"Before giving someone access to your CUI systems, verify who they are and conduct appropriate background screening.", looks:"Background checks are completed for all CUI access roles before access is granted. Records are retained.", steps:["Define screening requirements for positions with CUI access (background check, identity verification, employment history)","Partner with an HR screening vendor (Checkr, HireRight, etc.)","Document screening completion in personnel files","Establish a process for rescreening on role changes or concerning incidents"] },
  "3.9.2":  { mean:"When someone leaves or changes roles, immediately revoke the access they no longer need — within 24 hours for terminations.", looks:"A formal offboarding checklist ensures all access is revoked within 24 hours. Role changes trigger access reviews.", steps:["Create a formal offboarding checklist: disable accounts, collect credentials, collect devices, revoke VPN, revoke cloud access","Notify IT 24 hours in advance of planned terminations when possible","For unplanned terminations, have IT available to disable accounts immediately","For role changes, review and modify access within 5 business days"] },

  "3.10.1": { mean:"Physical access to your servers, workstations, and network equipment must be restricted to authorized personnel only.", looks:"Server rooms are locked. Workstations in CUI areas are accessible only to authorized staff. Access is controlled and logged.", steps:["Secure server rooms with key or keycard access","Maintain a list of who is authorized for physical access to CUI areas","Log physical access (sign-in sheets or keycard access logs)","Review access logs monthly and authorization list quarterly"] },
  "3.10.2": { mean:"Monitor your physical environment — know when unauthorized people enter areas where CUI is processed.", looks:"Security cameras, alarms, or keycard logs provide visibility. Environmental hazards are monitored.", steps:["Install cameras covering server rooms and CUI work areas","Implement intrusion detection or alarm systems","Monitor environmental threats: temperature, water, fire","Review footage and access logs regularly"] },
  "3.10.3": { mean:"Non-employees in your facility need supervision — never leave a visitor alone near CUI systems.", looks:"Visitors sign in, receive badges, and are escorted at all times in CUI areas. Visitor logs are maintained.", steps:["Implement a visitor log: name, company, date, purpose, host, badge number","Require all visitors to wear visible visitor badges","Assign a host who is responsible for escorting the visitor at all times","Brief all staff on the escorting requirement"] },
  "3.10.4": { mean:"Keep records of who physically accessed your secure areas — the same discipline you apply to digital access logs.", looks:"Physical access logs are retained for at least 90 days and reviewed monthly. Anomalies are investigated.", steps:["Ensure keycard systems log every entry and exit with timestamps","For manual sign-in, review and retain sign-in sheets","Retain physical access logs for at least 90 days","Review logs monthly for anomalies: after-hours access, unauthorized individuals"] },
  "3.10.5": { mean:"Track your physical access devices — keys, keycards, badges — and revoke them immediately when someone leaves.", looks:"A record of all issued access devices is maintained. Lost or stolen keycards are deactivated immediately. Devices are collected at offboarding.", steps:["Maintain a log of all issued keys, keycards, and access badges with recipient names","Recover all access devices during employee offboarding","Deactivate lost or stolen keycards within the hour","Audit all issued access devices annually"] },
  "3.10.6": { mean:"If employees work from home with CUI, that remote location needs physical protections too — not just network security.", looks:"Remote work policy covers physical security: locked storage for CUI, private workspace, no CUI on shared family computers.", steps:["Document physical security requirements for remote workers in your Remote Work or Physical Protection Policy","Require that CUI materials be stored in a lockable location at home","Prohibit CUI on shared family computers","Collect annual acknowledgment from remote workers confirming compliance"] },

  "3.11.1": { mean:"At least once a year, formally assess what the biggest threats to your CUI are and how likely they are to materialize.", looks:"An annual Risk Assessment Report exists. It identifies threats, vulnerabilities, likelihood, and impact, and informs your POA&M.", steps:["Schedule an annual risk assessment — put it on the calendar","Use a simple framework: identify assets → threats → vulnerabilities → likelihood → impact","Document findings in a Risk Assessment Report","Use results to prioritize the POA&M and security investments"] },
  "3.11.2": { mean:"Run vulnerability scans on your systems regularly — don't wait for a breach to discover security holes.", looks:"Quarterly vulnerability scans are conducted. Results are reviewed and tracked. Critical findings get immediate attention.", steps:["Deploy a scanner (Tenable Nessus Essentials is free, Qualys has a free tier)","Run scans at least quarterly on all in-scope systems","Prioritize Critical and High findings for remediation within 30 days","Document scan results and remediation actions"] },
  "3.11.3": { mean:"Finding vulnerabilities does not count — you have to fix them on a documented schedule based on risk severity.", looks:"Vulnerability findings are triaged. Critical and High findings have 30-day remediation timelines. Progress is tracked in the POA&M.", steps:["Establish a remediation SLA: Critical = 14 days, High = 30 days, Medium = 90 days","Track open vulnerabilities in your POA&M","Verify remediation by rescanning after each fix","Report remediation progress to management monthly"] },

  "3.12.1": { mean:"Don't just set up security controls and forget them — periodically verify they are still working as intended.", looks:"Annual self-assessments of security controls are documented. Controls that have degraded are flagged and addressed.", steps:["Conduct an annual review of all 110 controls (this tool facilitates that)","Test key controls: try a wrong password to test lockout, check logs are flowing, verify MFA is enforced","Document the assessment date and all findings","Update the SSP and POA&M based on findings"] },
  "3.12.2": { mean:"When you find a gap or control that isn't working, create a formal remediation plan with a deadline and an owner.", looks:"A POA&M exists and is kept current. Every deficiency has a plan, owner, and completion date. (This tool's POA&M tab handles this.)", steps:["Use this tool's POA&M tab to document all deficiencies","Assign a responsible party and realistic completion date to every item","Review the POA&M monthly with leadership","Close items with evidence of remediation when complete"] },
  "3.12.3": { mean:"Security is ongoing — continuous monitoring, alerts, and periodic checks ensure controls do not degrade over time.", looks:"Automated monitoring is in place: EDR, log reviews, configuration drift detection. Degraded controls are caught quickly.", steps:["Implement automated monitoring (EDR, SIEM, or vulnerability scanner on schedule)","Conduct monthly log reviews","Perform configuration compliance checks quarterly","Report monitoring status to leadership monthly"] },
  "3.12.4": { mean:"Your SSP is a living document — update it within 30 days of any significant change. (This control carries no SPRS score deduction but is required for assessment to proceed.)", looks:"An SSP exists, is signed by leadership, and is kept current. (This tool's SSP tab generates this document.)", steps:["Use the SSP tab in this tool to build and maintain your System Security Plan","Have leadership sign the SSP","Set a recurring annual review reminder","Update the SSP within 30 days of any significant system or organizational change"] },

  "3.13.1": { mean:"Have a firewall. Know what traffic goes in and out of your network. Block everything that shouldn't be there.", looks:"A next-generation firewall is deployed at your internet boundary. Rules are documented and reviewed. Traffic is logged.", steps:["Deploy a business-grade firewall (Fortinet, Palo Alto, Cisco Meraki, or pfSense)","Document every firewall rule with a business justification","Enable firewall logging","Review firewall rules annually and remove anything no longer justified"] },
  "3.13.2": { mean:"Security should be designed into your architecture from the start — network segmentation, least-privilege design, and isolation of CUI systems.", looks:"The network is segmented. CUI systems are isolated from general-purpose systems. New systems are designed with security in mind.", steps:["Segment your network with VLANs: CUI systems on a separate segment from general use","Document your network architecture in the SSP","Apply security requirements to any new system before it goes live","Review network architecture for gaps annually"] },
  "3.13.3": { mean:"Administrative interfaces for managing systems should be separate from user-facing interfaces — admins shouldn't use the same portal as regular users.", looks:"Admin consoles and management interfaces require separate admin credentials and are not reachable by regular users.", steps:["Ensure management interfaces are not accessible from the regular user network","Restrict management interface access to IT admin accounts only","Consider a dedicated management VLAN","Disable web-based management interfaces from untrusted networks"] },
  "3.13.4": { mean:"Prevent one application or user from reading data left in memory or storage by another — basic OS-level isolation.", looks:"Modern, patched operating systems with memory isolation enabled. Sensitive workloads run in separate VMs where feasible.", steps:["Apply OS security patches promptly — many address memory isolation vulnerabilities","Enable ASLR and DEP on Windows (on by default in modern Windows)","Use separate VMs for workloads with different sensitivity levels where possible","Avoid co-mingling CUI and non-CUI data in shared databases without access controls"] },
  "3.13.5": { mean:"Public-facing systems (web servers, email gateways) must live in a DMZ — separate from your internal CUI systems.", looks:"Public-facing systems are in a DMZ. Firewall rules prevent the DMZ from directly reaching internal CUI systems.", steps:["Create a DMZ network segment for all internet-facing systems","Configure firewall rules: internet → DMZ permitted; DMZ → internal CUI blocked","Ensure your email gateway, web server, and other public services are in the DMZ","Document the DMZ architecture in the SSP"] },
  "3.13.6": { mean:"Your firewall should block everything by default and only allow what is explicitly needed — not allow everything and block the bad stuff.", looks:"Default firewall rule is DENY ALL. Only explicitly needed traffic is permitted by specific allow rules.", steps:["Audit firewall rules — remove any overly broad 'allow all' rules","Implement an implicit deny-all as your final firewall rule","Document the business justification for every allow rule","Review and clean up rules annually"] },
  "3.13.7": { mean:"When someone VPNs in, all their internet traffic should flow through the VPN (full tunnel) — split tunneling lets a compromised laptop bridge into your network.", looks:"VPN is configured for full tunnel. Employees cannot simultaneously access your systems and browse the public internet unsecured.", steps:["Configure VPN for full tunnel mode (not split tunnel)","Verify in your VPN admin console","Test: when connected to VPN, your public IP should be the company IP","Document the full-tunnel requirement in your Access Control Policy"] },
  "3.13.8": { mean:"Any time CUI travels over a network it must be encrypted — email, file transfer, application traffic, everything.", looks:"TLS 1.2+ is enforced on all web applications and servers. Email uses encryption. File transfers use SFTP or encrypted sharing tools.", steps:["Disable TLS 1.0 and 1.1 on all servers — require TLS 1.2+","Enable HTTPS on all internal and external web applications","Configure email encryption for external CUI sharing","Use SFTP instead of FTP for all file transfers"] },
  "3.13.9": { mean:"Network connections should close automatically after idle time — don't leave VPN sessions and remote desktops open forever.", looks:"VPN sessions, remote desktop sessions, and web app sessions all have idle timeouts configured.", steps:["Configure VPN session idle timeout (15–30 minutes)","Set remote desktop session timeout","Configure application session timeouts for web apps handling CUI","Document timeout settings in the Access Control Policy"] },
  "3.13.10":{ mean:"If you use encryption, manage the keys properly — store them securely, know how to rotate them, and have a recovery process.", looks:"Encryption keys are stored securely (not on the same system they protect). BitLocker recovery keys are backed up. Key rotation procedures exist.", steps:["Store BitLocker recovery keys in Active Directory or Azure AD — not in a local text file","Document your key management procedures","For application encryption use a secrets manager (HashiCorp Vault, Azure Key Vault)","Document the rotation procedure and test recovery annually"] },
  "3.13.11":{ mean:"The specific encryption tools you use must be FIPS 140-2 government-certified. Strong but uncertified encryption is not sufficient for CUI protection under this control.", looks:"BitLocker in FIPS mode, AES-256 VPN with FIPS-validated libraries, and FIPS-validated SSH tools are used wherever CUI is protected.", steps:["Enable FIPS mode in Windows Group Policy: Computer Config → Windows Settings → Security Settings → Local Policies → Security Options → 'Use FIPS compliant algorithms'","Verify your VPN product has a FIPS 140-2 certificate (check NIST CMVP at csrc.nist.gov/projects/cryptographic-module-validation-program)","Use FIPS-validated SSH tools (OpenSSH on RHEL with FIPS mode enabled)","Document all FIPS-validated cryptographic tools in the SSP"] },
  "3.13.12":{ mean:"Cameras, microphones, and screen-sharing tools should not be remotely activatable without the user's knowledge or consent.", looks:"Webcams have physical covers or kill switches. Remote support tools require user consent before viewing the screen.", steps:["Install webcam covers on workstations in CUI areas","Review remote support tools to ensure they require user consent for screen access","Establish a policy against remote activation of cameras or microphones without notice","Check that Teams, Zoom, and other collaboration tools require explicit user activation"] },
  "3.13.13":{ mean:"Control scripts, applets, and macros that execute on your systems — these are common malware delivery vehicles.", looks:"Office macros are disabled by default. Browser security settings restrict untrusted scripts. Only authorized code runs.", steps:["Disable macros in Microsoft Office for all users except those with a documented business need","Configure browser security settings to restrict untrusted scripts","Enable application whitelisting to prevent unapproved scripts","Train users never to enable macros in documents from unknown sources"] },
  "3.13.14":{ mean:"If you use VoIP phone systems, they need security controls too — especially if CUI is ever discussed on calls.", looks:"VoIP is on a separate VLAN. Encrypted signaling (SRTP) is used. VoIP admin access is controlled.", steps:["Place VoIP systems on a dedicated VLAN separate from CUI data systems","Enable SRTP encryption on your VoIP platform","Apply the same access controls to VoIP management interfaces as to other admin systems","Ensure VoIP vendor contracts include appropriate security requirements"] },
  "3.13.15":{ mean:"Ensure network sessions are legitimate and protected against hijacking and man-in-the-middle attacks.", looks:"HTTPS with valid certificates is used everywhere. VPN certificates come from trusted authorities. Session tokens are protected.", steps:["Use valid TLS certificates from trusted CAs (Let's Encrypt is free) on all services","Implement HTTP Strict Transport Security (HSTS) on web applications","Monitor for certificate expiration and renew proactively","Configure certificate pinning for high-value internal applications"] },
  "3.13.16":{ mean:"When CUI sits in storage — on a drive, in a database, in cloud storage — it must be encrypted at rest.", looks:"BitLocker or FileVault is enabled on all devices. Cloud storage encryption at rest is enabled. Databases with CUI are encrypted.", steps:["Enable BitLocker on all Windows systems with CUI via Group Policy","Enable FileVault on all Macs with CUI","Verify cloud storage encryption at rest is turned on (most providers offer this but it may not be the default)","Encrypt databases containing CUI at the database or filesystem level"] },

  "3.14.1": { mean:"Patch your systems. Known vulnerabilities have known exploits — staying unpatched is one of the most common ways organizations get breached.", looks:"A patch management process exists. Critical patches are applied within 14 days. A patching schedule is documented and followed.", steps:["Enable Windows Update and automatic patching on all workstations","Implement a patch management tool for servers (WSUS, Intune, Ansible)","Set a patching cadence: Critical = 14 days, High = 30 days, monthly for everything else","Track patching compliance and report to management"] },
  "3.14.2": { mean:"Deploy antivirus or EDR on every system — running, updated, and actively protecting. Microsoft Defender is included with Windows and counts if properly configured.", looks:"Endpoint protection is on all workstations and servers. Definitions update daily. Real-time protection is enabled.", steps:["Verify Microsoft Defender is active and not disabled on all Windows systems","Ensure definitions update automatically and at least daily","Enable real-time protection and cloud-based threat intelligence","For stronger protection consider a commercial EDR: CrowdStrike Falcon Go, SentinelOne, etc."] },
  "3.14.3": { mean:"Stay informed about new threats relevant to your systems. CISA and software vendors publish alerts — someone at your organization needs to read them.", looks:"Your organization subscribes to CISA alerts and relevant vendor security bulletins. Applicable advisories are acted on.", steps:["Subscribe to CISA email alerts at cisa.gov/subscribe-to-free-cybersecurity-alerts","Subscribe to security advisories for your key software vendors (Microsoft, Cisco, etc.)","Assign responsibility to a specific person for reviewing and acting on alerts","Document how you monitor and respond to security advisories in the SI Policy"] },
  "3.14.4": { mean:"Keep the antivirus and EDR software itself updated — not just the signatures. Outdated security software has known bypasses.", looks:"Endpoint protection software versions are current across all devices. Software updates are applied promptly.", steps:["Verify auto-update is enabled for your endpoint protection software","Periodically spot-check that software versions are current (not just signatures)","Include security tool updates in your patch management process","Confirm updates are reaching all endpoints by checking a sample"] },
  "3.14.5": { mean:"Run scheduled full-system scans weekly, and scan any file that comes in from outside before it executes.", looks:"Weekly full-system scans are scheduled. Email attachments are scanned automatically. Files from removable media are scanned on connection.", steps:["Configure scheduled weekly full-system scans on all endpoints","Verify email security gateway scans all attachments before delivery","Configure AV to scan removable media automatically on connection","Review scan results weekly and investigate any detections"] },
  "3.14.6": { mean:"Have active monitoring that looks for signs of an ongoing attack — not just reactive detection after damage is done.", looks:"EDR with behavioral detection is deployed. Alerts fire for common indicators of compromise: unusual outbound traffic, new admin accounts, lateral movement.", steps:["Deploy EDR with behavioral detection (not signature-only AV)","Configure alerts for common IOCs: unusual outbound traffic, lateral movement, new admin accounts created","Conduct weekly log reviews specifically looking for attack indicators","Subscribe to threat intelligence relevant to your sector (CISA, industry ISACs)"] },
  "3.14.7": { mean:"Know when someone is using your systems in unauthorized ways — whether from a compromised account or an insider threat.", looks:"Behavioral monitoring is in place. After-hours privileged access, large data exports, and unusual file access trigger alerts or reviews.", steps:["Implement User and Entity Behavior Analytics (UEBA) — available in Microsoft Sentinel and other SIEMs","Configure alerts for after-hours privileged access","Monitor for large data exports or unusual file access patterns","Conduct periodic user activity reviews, especially for privileged and admin accounts"] },
};

// ═══════════════════════════════════════════════════════════
// Gap Wizard — state and view
// ═══════════════════════════════════════════════════════════
let wizardControls = [];  // incomplete controls sorted by pts desc
let wizardIndex    = 0;   // current position
let wizardStarted  = false;

function initWizard() {
  wizardControls = CONTROLS.filter(c => getOrg(c.id) !== 'complete').sort((a,b) => {
    const wa = SPRS_WEIGHTS[a.id], wb = SPRS_WEIGHTS[b.id];
    const pa = wa==='special'?5:wa===undefined?1:(wa===0?0:wa);
    const pb = wb==='special'?5:wb===undefined?1:(wb===0?0:wb);
    return pb - pa || a.id.localeCompare(b.id, undefined, {numeric:true});
  });
  wizardIndex   = 0;
  wizardStarted = false;
}

function buildWizardView() {
  initWizard();
  const container = document.getElementById('wizardView');
  if (!container) return;

  if (!wizardStarted) {
    container.innerHTML = buildWizardIntro();
  } else if (wizardIndex >= wizardControls.length) {
    container.innerHTML = buildWizardDone();
  } else {
    container.innerHTML = buildWizardCard(wizardIndex);
  }
}

function buildWizardIntro() {
  const total     = wizardControls.length;
  const fivePts   = wizardControls.filter(c=>SPRS_WEIGHTS[c.id]===5||SPRS_WEIGHTS[c.id]==='special').length;
  const ptsAtRisk = wizardControls.reduce((s,c)=>{const w=SPRS_WEIGHTS[c.id];return s+(w==='special'?5:w===0?0:w===undefined?1:w);},0);
  const score     = computeSPRS();

  if (total === 0) {
    return `<div class="wiz-wrap"><div class="wiz-done">
      <div class="wiz-done-icon">🏆</div>
      <h3>No gaps to review!</h3>
      <p>All 110 controls are marked complete. Your SPRS score is 110.</p>
    </div></div>`;
  }

  return `<div class="wiz-wrap">
    <div class="wiz-intro">
      <div class="wiz-intro-header">
        <h2>🧭 Gap Wizard</h2>
        <p>Walk through your open gaps one at a time — plain English explanations, concrete action steps, highest impact first.</p>
      </div>
      <div class="wiz-intro-stats">
        <div class="wiz-stat"><div class="wiz-stat-num" style="color:#ef4444">${total}</div><div class="wiz-stat-lbl">Open Gaps</div></div>
        <div class="wiz-stat"><div class="wiz-stat-num" style="color:#ef4444">${fivePts}</div><div class="wiz-stat-lbl">Critical (5-pt)</div></div>
        <div class="wiz-stat"><div class="wiz-stat-num" style="color:${score>=88?'#22c55e':score>=0?'#f59e0b':'#ef4444'}">${score}</div><div class="wiz-stat-lbl">Current SPRS</div></div>
      </div>
      <div class="wiz-intro-body">
        <p>The wizard will show you each incomplete control starting with the highest-value ones. For each control you'll see what it actually means in plain English, what "done" looks like for a small business, and specific first steps to take.</p>
        <p>As you work through gaps and mark controls complete in the <strong>Organization tab</strong>, your SPRS score updates in real time. You're currently at risk of losing <strong>${ptsAtRisk} SPRS points</strong> from the maximum score of 110.</p>
        <button class="wiz-start-btn" onclick="startWizard()">Start Reviewing My ${total} Gaps →</button>
      </div>
    </div>
  </div>`;
}

function startWizard() {
  wizardStarted = true;
  const container = document.getElementById('wizardView');
  if (container) container.innerHTML = buildWizardCard(0);
}

function buildWizardCard(idx) {
  const c    = wizardControls[idx];
  const pl   = PLAIN_LANGUAGE[c.id] || { mean:'See NIST SP 800-171 Rev 2 for full requirement text.', looks:'Control is fully implemented and evidence is documented.', steps:['Review the NIST SP 800-171 Rev 2 requirement','Implement the required control','Document implementation in the SSP'] };
  const wRaw = SPRS_WEIGHTS[c.id];
  const pts  = wRaw==='special'?5:wRaw===0?0:wRaw===undefined?1:wRaw;
  const meta = DOMAIN_META[c.domain]||{color:'#64748b',name:c.domain};
  const pct  = Math.round(idx / wizardControls.length * 100);
  const s    = getOrg(c.id);

  const stepsHtml = pl.steps.map(st=>`<li>${st}</li>`).join('');
  const statusColor = s==='in-progress'?'#f59e0b':'#ef4444';
  const statusLabel = s==='in-progress'?'In Progress':'Not Implemented';

  return `<div class="wiz-wrap">
    <div class="wiz-card">
      <div class="wiz-card-header" style="background:${meta.color}">
        <span class="wiz-card-id">${c.id}</span>
        <span class="wiz-card-title">${c.summary}</span>
        <span class="wiz-card-pts">${pts===0?'0 pts':pts+' pt'+(pts!==1?'s':'')}</span>
      </div>
      <div class="wiz-progress-bar-wrap"><div class="wiz-progress-bar-fill" style="width:${pct}%"></div></div>

      <div style="display:flex;align-items:center;gap:8px;padding:10px 24px 0;font-size:11px;color:#64748b">
        <span style="background:${meta.color};color:#fff;font-size:9px;font-weight:800;padding:1px 7px;border-radius:3px">${meta.name||c.domain}</span>
        <span style="background:${statusColor}20;color:${statusColor};font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px">● ${statusLabel}</span>
        <span style="margin-left:auto">${idx+1} of ${wizardControls.length} gaps</span>
      </div>

      <div class="wiz-sections">
        <div class="wiz-section">
          <div class="wiz-section-label blue">📖 What this means</div>
          <div class="wiz-section-text">${pl.mean}</div>
        </div>
        <div class="wiz-section">
          <div class="wiz-section-label green">✅ What implemented looks like</div>
          <div class="wiz-section-text">${pl.looks}</div>
        </div>
        <div class="wiz-section">
          <div class="wiz-section-label amber">⚡ First steps to get there</div>
          <ol class="wiz-steps">${stepsHtml}</ol>
        </div>
        <div class="wiz-section" style="background:#f8fafc;padding:12px 24px">
          <div style="font-size:11px;color:#94a3b8;margin-bottom:6px">Evidence required to satisfy this control:</div>
          <div style="font-size:12px;color:#475569;line-height:1.5">${c.evidence}</div>
        </div>
      </div>

      <div class="wiz-nav">
        <button class="wiz-btn" onclick="wizardNav(${idx-1})" ${idx===0?'disabled':''}>← Prev</button>
        <div class="wiz-nav-counter">
          <div style="font-size:13px;font-weight:700;color:#1e293b">${idx+1} / ${wizardControls.length}</div>
          <div style="font-size:10px;margin-top:1px">${wizardControls.length - idx - 1} remaining</div>
        </div>
        <button class="wiz-btn" onclick="wizardNav(${idx+1})">Skip →</button>
        <button class="wiz-btn success" onclick="wizardMarkComplete('${c.id}', ${idx})">✓ Mark Complete</button>
      </div>
    </div>
  </div>`;
}

function buildWizardDone() {
  const remaining = CONTROLS.filter(c=>getOrg(c.id)!=='complete').length;
  const score     = computeSPRS();
  return `<div class="wiz-wrap"><div class="wiz-done">
    <div class="wiz-done-icon">${remaining===0?'🏆':'🎯'}</div>
    <h3>${remaining===0 ? 'All gaps reviewed and complete!' : 'You\'ve reviewed all your gaps!'}</h3>
    <p>${remaining===0
      ? 'All 110 controls are marked complete. Your SPRS score is '+score+'.'
      : remaining+' gaps remain. Your current SPRS score is '+score+'. Head to the Organization tab to mark controls complete as you implement them, or revisit the wizard any time.'}</p>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="wiz-btn primary" onclick="wizardRestart()">↺ Restart Wizard</button>
      <button class="wiz-btn" onclick="setMode('sprs')">View SPRS Score</button>
      <button class="wiz-btn" onclick="setMode('templates')">Go to Evidence Templates</button>
    </div>
  </div></div>`;
}

function wizardNav(idx) {
  wizardIndex = Math.max(0, Math.min(idx, wizardControls.length));
  const container = document.getElementById('wizardView');
  if (!container) return;
  if (wizardIndex >= wizardControls.length) {
    container.innerHTML = buildWizardDone();
  } else {
    container.innerHTML = buildWizardCard(wizardIndex);
  }
}

function wizardMarkComplete(ctrlId, idx) {
  setOrg(ctrlId, 'complete');
  // Rebuild the wizard list without this control and advance
  initWizard();
  // Stay at the same index (next control slides in), but cap at end
  wizardStarted = true;
  wizardIndex   = Math.min(idx, wizardControls.length - 1);
  const container = document.getElementById('wizardView');
  if (!container) return;
  if (wizardControls.length === 0 || wizardIndex < 0) {
    container.innerHTML = buildWizardDone();
  } else {
    container.innerHTML = buildWizardCard(wizardIndex);
  }
  updateStats();
  updateAllProgress();
}

function wizardRestart() {
  wizardStarted = false;
  buildWizardView();
}

// Boot
initSupabase();

let tourStep = 0;

function buildTourCard() {
  const s = TOUR_STEPS[tourStep];
  const total = TOUR_STEPS.length;
  const isLast = tourStep === total - 1;
  const isFirst = tourStep === 0;

  const dots = TOUR_STEPS.map((_,i) =>
    `<div class="tour-dot${i===tourStep?' active':''}"></div>`
  ).join('');

  const featureItems = s.features.map(f =>
    `<li><span class="tour-feature-icon">${f.icon}</span><span>${f.text}</span></li>`
  ).join('');

  document.getElementById('tourBackdrop').innerHTML = `
    <div class="tour-card" role="dialog" aria-modal="true" aria-label="${s.title}">
      <div class="tour-card-header">
        <span class="tour-card-icon">${s.icon}</span>
        <div class="tour-card-step-pill">Step ${tourStep+1} of ${total} — ${s.label}</div>
        <h2>${s.title}</h2>
        <p>${s.subtitle}</p>
      </div>
      <div class="tour-card-body">
        <ul class="tour-feature-list">${featureItems}</ul>
        <div class="tour-progress-dots">${dots}</div>
      </div>
      <div class="tour-card-footer">
        <button class="tour-skip-btn" onclick="endTour()">Skip tour</button>
        <div class="tour-nav-btns">
          ${!isFirst ? `<button class="tour-prev-btn" onclick="tourNav(${tourStep-1})">← Back</button>` : ''}
          <button class="tour-next-btn" onclick="${isLast ? 'endTour()' : `tourNav(${tourStep+1})`}">
            ${isLast ? 'Get Started →' : 'Next →'}
          </button>
        </div>
      </div>
    </div>
  `;
}

function tourNav(idx) {
  tourStep = idx;
  buildTourCard();
}

function startTour() {
  tourStep = 0;
  document.getElementById('tourBackdrop').classList.remove('hidden');
  buildTourCard();
}

function endTour() {
  document.getElementById('tourBackdrop').classList.add('hidden');
  localStorage.setItem('cmmc_tour_done', '1');
}

// Close on backdrop click
document.addEventListener('click', (e) => {
  if (e.target.id === 'tourBackdrop') endTour();
});

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  const backdrop = document.getElementById('tourBackdrop');
  if (backdrop.classList.contains('hidden')) return;
  if (e.key === 'ArrowRight' && tourStep < TOUR_STEPS.length - 1) tourNav(tourStep + 1);
  if (e.key === 'ArrowLeft' && tourStep > 0) tourNav(tourStep - 1);
  if (e.key === 'Escape') endTour();
});

// Auto-show on first visit
if (!localStorage.getItem('cmmc_tour_done')) {
  // slight delay so the page loads first
  setTimeout(startTour, 800);
}

<div class="tour-backdrop hidden" id="tourBackdrop"></div>
