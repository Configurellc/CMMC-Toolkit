<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIST SP 800-171 / CMMC Level 2 — Audit Checklist</title>

  const SUPABASE_URL      = 'YOUR_SUPABASE_URL';

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root { color-scheme: light; }
*{ box-sizing:border-box; margin:0; padding:0; }
body{ font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#f0f2f5; color:#1a1a2e; font-size:14px; }

/* ── Top bar ── */
.top-bar{ background:#1a1a2e; color:#fff; padding:12px 20px; position:sticky; top:0; z-index:100; }
.top-row{ display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
.top-titles h1{ font-size:15px; font-weight:700; }
.top-titles .sub{ font-size:11px; opacity:.6; margin-top:1px; }
.top-right{ display:flex; align-items:center; gap:10px; }

/* Mode toggle */
.mode-toggle{ display:flex; background:rgba(255,255,255,.1); border-radius:20px; padding:3px; gap:2px; }
.mode-btn{ border:none; background:transparent; color:rgba(255,255,255,.6); font-size:11px; font-weight:600; padding:4px 12px; border-radius:16px; cursor:pointer; transition:all .2s; white-space:nowrap; }
.mode-btn.active{ background:#fff; color:#1a1a2e; }

/* Connection pill */
.conn-pill{ display:flex; align-items:center; gap:5px; font-size:11px; padding:3px 10px; border-radius:20px; white-space:nowrap; }
.conn-pill.connecting{ background:rgba(255,255,255,.1); color:rgba(255,255,255,.5); }
.conn-pill.live{ background:rgba(74,222,128,.2); color:#4ade80; }
.conn-pill.error{ background:rgba(239,68,68,.2); color:#f87171; }
.conn-dot{ width:7px; height:7px; border-radius:50%; background:currentColor; }
.conn-pill.live .conn-dot{ animation:pulse 2s infinite; }
@keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.4} }

/* Progress bars */
.prog-section{ margin-top:10px; }
.prog-row{ display:flex; align-items:center; gap:10px; }
.prog-bar-wrap{ flex:1; background:rgba(255,255,255,.15); border-radius:6px; height:8px; overflow:hidden; display:flex; }
.prog-seg{ height:100%; transition:width .4s; }
.seg-green{ background:#4ade80; }
.seg-red{ background:#f87171; }
.seg-gray{ background:#94a3b8; }
.prog-label{ font-size:11px; white-space:nowrap; opacity:.85; }

/* Loading */
.loading-overlay{ position:fixed; inset:0; background:rgba(255,255,255,.85); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:999; gap:12px; }
.loading-overlay.hidden{ display:none; }
.spinner{ width:36px; height:36px; border:3px solid #e2e8f0; border-top-color:#6366f1; border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin{ to{ transform:rotate(360deg); } }
.loading-text{ font-size:13px; color:#64748b; }


/* ── Controls bar ── */
.controls-bar{ background:#fff; border-bottom:1px solid #e2e8f0; padding:10px 20px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; position:sticky; top:var(--topbar-h, 95px); z-index:99; }
.search-box{ border:1px solid #e2e8f0; border-radius:6px; padding:6px 10px; font-size:13px; width:190px; outline:none; }
.search-box:focus{ border-color:#6366f1; }
.filter-btn{ border:1px solid #e2e8f0; background:#fff; border-radius:6px; padding:4px 11px; font-size:12px; cursor:pointer; color:#555; transition:all .15s; }
.filter-btn.active{ background:#1a1a2e; color:#fff; border-color:#1a1a2e; }
.domain-select{ border:1px solid #e2e8f0; border-radius:6px; padding:4px 8px; font-size:12px; color:#555; background:#fff; cursor:pointer; }

/* ── Main ── */
.main{ padding:14px 20px; max-width:1100px; margin:0 auto; }

/* Stats */
.stats-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:16px; }
.stat-card{ background:#fff; border:1px solid #e2e8f0; border-radius:8px; padding:10px 14px; text-align:center; }
.stat-num{ font-size:26px; font-weight:800; color:#1a1a2e; }
.stat-num.green{ color:#22c55e; }
.stat-num.red{ color:#ef4444; }
.stat-num.yellow{ color:#f59e0b; }
.stat-num.gray{ color:#94a3b8; }
.stat-label{ font-size:10px; color:#94a3b8; margin-top:1px; text-transform:uppercase; letter-spacing:.4px; }

/* Domain section */
.domain-section{ margin-bottom:16px; }
.domain-header{ display:flex; align-items:center; justify-content:space-between; color:#fff; padding:9px 16px; border-radius:8px 8px 0 0; cursor:pointer; user-select:none; }
.domain-header-left{ display:flex; align-items:center; gap:10px; }
.domain-badge{ background:rgba(255,255,255,.15); border-radius:4px; padding:2px 8px; font-size:11px; font-weight:700; letter-spacing:.5px; }
.domain-title{ font-size:13px; font-weight:600; }
.domain-meta{ display:flex; align-items:center; gap:8px; font-size:11px; opacity:.85; }
.domain-prog-mini{ width:70px; background:rgba(255,255,255,.2); border-radius:4px; height:5px; }
.domain-prog-fill{ height:100%; background:#4ade80; border-radius:4px; transition:width .3s; }
.chevron{ font-size:10px; opacity:.6; transition:transform .2s; }
.chevron.open{ transform:rotate(180deg); }
.domain-body{ background:#fff; border:1px solid #e2e8f0; border-top:none; border-radius:0 0 8px 8px; overflow:hidden; }

/* ── ORG MODE: Control row ── */
.control-row{ display:grid; grid-template-columns:26px 68px 1fr auto; gap:10px; align-items:start; padding:9px 14px; border-bottom:1px solid #f1f5f9; transition:background .1s; }
.control-row:last-child{ border-bottom:none; }
.control-row:hover{ background:#fafbfc; }
.control-row.status-complete{ background:#f0fdf4; }
.control-row.status-in-progress{ background:#fffbeb; }
.control-row.hidden{ display:none; }
.control-row.saving{ opacity:.6; pointer-events:none; }
.ctrl-check{ width:17px; height:17px; margin-top:2px; cursor:pointer; accent-color:#22c55e; }
.ctrl-id{ font-family:monospace; font-size:11px; font-weight:700; color:#6366f1; padding-top:2px; white-space:nowrap; }
.ctrl-body{ min-width:0; }
.ctrl-summary{ font-size:13px; color:#1a1a2e; line-height:1.45; font-weight:500; }
.ctrl-evidence{ font-size:11px; color:#64748b; margin-top:5px; line-height:1.5; display:none; }
.ctrl-evidence.visible{ display:block; }
.ev-label{ font-weight:700; color:#94a3b8; text-transform:uppercase; font-size:10px; letter-spacing:.5px; margin-bottom:2px; }
.ev-toggle{ font-size:10px; color:#6366f1; cursor:pointer; text-decoration:underline; margin-top:4px; display:inline-block; }
.status-select{ font-size:11px; border:1px solid #e2e8f0; border-radius:5px; padding:3px 6px; background:#fff; cursor:pointer; color:#555; white-space:nowrap; }
.status-select.s-complete{ background:#dcfce7; border-color:#86efac; color:#166534; }
.status-select.s-in-progress{ background:#fef3c7; border-color:#fcd34d; color:#92400e; }

/* ── AUDITOR MODE: Control block ── */
.audit-control{ border-bottom:1px solid #f1f5f9; }
.audit-control:last-child{ border-bottom:none; }
.audit-control.hidden{ display:none; }
.audit-ctrl-header{ display:grid; grid-template-columns:68px 1fr auto; gap:10px; align-items:center; padding:9px 14px 6px; cursor:pointer; user-select:none; background:#fafbfc; }
.audit-ctrl-header:hover{ background:#f1f5f9; }
.audit-ctrl-id{ font-family:monospace; font-size:11px; font-weight:700; color:#6366f1; }
.audit-ctrl-title{ font-size:12px; font-weight:600; color:#334155; line-height:1.35; }
.audit-ctrl-meta{ display:flex; align-items:center; gap:6px; white-space:nowrap; }
.obj-count{ font-size:10px; color:#94a3b8; }
.ctrl-chevron{ font-size:9px; color:#94a3b8; transition:transform .2s; }
.ctrl-chevron.open{ transform:rotate(180deg); }

/* Objective rows */
.objectives-list{ display:none; border-top:1px solid #f1f5f9; }
.objectives-list.open{ display:block; }
.obj-row{ display:grid; grid-template-columns:40px 1fr auto; gap:8px; align-items:center; padding:6px 14px 6px 28px; border-bottom:1px solid #f8fafc; transition:background .1s; }
.obj-row:last-child{ border-bottom:none; }
.obj-row.o-met{ background:#f0fdf4; }
.obj-row.o-not-met{ background:#fef2f2; }
.obj-row.o-not-applicable{ background:#f8fafc; }
.obj-row.hidden{ display:none; }
.obj-row.saving{ opacity:.6; pointer-events:none; }
.obj-id{ font-family:monospace; font-size:10px; font-weight:700; color:#94a3b8; }
.obj-text{ font-size:12px; color:#334155; line-height:1.4; }
.obj-select{ font-size:11px; border:1px solid #e2e8f0; border-radius:5px; padding:2px 5px; background:#fff; cursor:pointer; color:#555; white-space:nowrap; }
.obj-select.o-met{ background:#dcfce7; border-color:#86efac; color:#166534; }
.obj-select.o-not-met{ background:#fee2e2; border-color:#fca5a5; color:#991b1b; }
.obj-select.o-not-applicable{ background:#e2e8f0; border-color:#cbd5e1; color:#475569; }

/* ── SPRS Calculator ── */
.sprs-header-card{ background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%); border-radius:12px; padding:20px 24px; margin-bottom:16px; color:#fff; }
.sprs-top-row{ display:flex; align-items:flex-start; gap:24px; flex-wrap:wrap; }
.sprs-score-block{ text-align:center; min-width:130px; }
.sprs-score-label{ font-size:10px; letter-spacing:1px; text-transform:uppercase; opacity:.6; margin-bottom:6px; }
.sprs-score-value{ font-size:60px; font-weight:900; line-height:1; }
.sprs-score-value.s-green{ color:#4ade80; }
.sprs-score-value.s-yellow{ color:#facc15; }
.sprs-score-value.s-orange{ color:#fb923c; }
.sprs-score-value.s-red{ color:#f87171; }
.sprs-score-sublabel{ font-size:11px; opacity:.5; margin-top:4px; }
.sprs-gauge-block{ flex:1; min-width:220px; }
.sprs-gauge-title{ font-size:10px; letter-spacing:.5px; text-transform:uppercase; opacity:.6; margin-bottom:10px; }
.sprs-gauge-wrap{ position:relative; height:20px; background:rgba(255,255,255,.1); border-radius:10px; overflow:hidden; }
.sprs-gauge-fill{ height:100%; border-radius:10px; transition:width .5s ease; }
.sprs-gauge-fill.g-green{ background:linear-gradient(90deg,#16a34a,#4ade80); }
.sprs-gauge-fill.g-yellow{ background:linear-gradient(90deg,#92400e,#facc15); }
.sprs-gauge-fill.g-orange{ background:linear-gradient(90deg,#9a3412,#fb923c); }
.sprs-gauge-fill.g-red{ background:linear-gradient(90deg,#7f1d1d,#f87171); }
.sprs-gauge-labels{ display:flex; justify-content:space-between; font-size:10px; opacity:.45; margin-top:5px; }
.sprs-benchmarks{ display:flex; gap:16px; margin-top:10px; flex-wrap:wrap; }
.sprs-bm{ font-size:11px; opacity:.75; display:flex; align-items:center; gap:5px; }
.sprs-bm-dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.sprs-stats-row{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:18px; }
.sprs-stat-card{ background:rgba(255,255,255,.07); border-radius:8px; padding:12px 14px; text-align:center; }
.sprs-stat-num{ font-size:28px; font-weight:800; }
.sprs-stat-num.green{ color:#4ade80; }
.sprs-stat-num.yellow{ color:#facc15; }
.sprs-stat-num.red{ color:#f87171; }
.sprs-stat-num.orange{ color:#fb923c; }
.sprs-stat-label{ font-size:10px; opacity:.55; margin-top:2px; text-transform:uppercase; letter-spacing:.4px; }
.sprs-special-notice{ background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin-bottom:14px; font-size:12px; line-height:1.7; }
.sprs-special-notice strong{ color:#92400e; }
.sprs-special-row{ display:flex; align-items:center; gap:10px; margin-top:6px; flex-wrap:wrap; }
.sprs-special-select{ border:1px solid #fcd34d; border-radius:5px; padding:4px 8px; font-size:12px; background:#fffbeb; cursor:pointer; color:#78350f; }
.sprs-table-section{ background:#fff; border:1px solid #e2e8f0; border-radius:10px; overflow:hidden; }
.sprs-table-header{ background:#f8fafc; padding:12px 16px; border-bottom:1px solid #e2e8f0; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:6px; }
.sprs-table-title{ font-size:13px; font-weight:700; color:#1a1a2e; }
.sprs-table-sub{ font-size:11px; color:#94a3b8; }
.sprs-table{ width:100%; border-collapse:collapse; }
.sprs-table th{ text-align:left; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:#94a3b8; padding:8px 14px; border-bottom:1px solid #f1f5f9; background:#f8fafc; }
.sprs-table td{ padding:8px 14px; border-bottom:1px solid #f8fafc; font-size:12px; vertical-align:middle; }
.sprs-table tr:last-child td{ border-bottom:none; }
.sprs-table tr.complete-row td{ opacity:.4; }
.sprs-pts-badge{ display:inline-flex; align-items:center; justify-content:center; width:26px; height:22px; border-radius:5px; font-size:11px; font-weight:800; }
.sprs-pts-badge.p5{ background:#fee2e2; color:#dc2626; }
.sprs-pts-badge.p3{ background:#fef3c7; color:#b45309; }
.sprs-pts-badge.p1{ background:#f1f5f9; color:#475569; }
.sprs-pts-badge.p0{ background:#f1f5f9; color:#cbd5e1; font-style:italic; }
.sprs-domain-chip{ display:inline-block; font-size:10px; font-weight:700; padding:2px 7px; border-radius:4px; color:#fff; }
.sprs-ctrl-id{ font-family:monospace; font-size:11px; font-weight:700; color:#6366f1; white-space:nowrap; }
.sprs-ctrl-summary{ color:#334155; line-height:1.4; }
.sprs-status-chip{ font-size:10px; padding:2px 7px; border-radius:4px; font-weight:600; white-space:nowrap; }
.sprs-status-chip.not-started{ background:#f1f5f9; color:#64748b; }
.sprs-status-chip.in-progress{ background:#fef3c7; color:#92400e; }
.sprs-special-badge{ font-size:10px; background:#dbeafe; color:#1d4ed8; padding:1px 5px; border-radius:3px; margin-left:4px; white-space:nowrap; }
.sprs-gauge-marker{ position:absolute; top:0; bottom:0; width:2px; pointer-events:none; }

/* ── Evidence Templates ── */
.tpl-wrap{ max-width:860px; margin:0 auto; }
.tpl-sub-tabs{ display:flex; gap:0; background:#fff; border:1px solid #e2e8f0; border-radius:8px; overflow:hidden; margin-bottom:16px; }
.tpl-sub-btn{ flex:1; border:none; background:transparent; padding:10px 0; font-size:12px; font-weight:600; color:#64748b; cursor:pointer; border-right:1px solid #e2e8f0; transition:all .15s; }
.tpl-sub-btn:last-child{ border-right:none; }
.tpl-sub-btn.active{ background:#1a1a2e; color:#fff; }
.tpl-sub-btn:hover:not(.active){ background:#f8fafc; }

.tpl-export-bar{ display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
.tpl-export-bar h2{ font-size:14px; font-weight:700; color:#1a1a2e; }
.tpl-export-btns{ display:flex; gap:8px; }
.tpl-btn{ border:1px solid #6366f1; border-radius:6px; padding:5px 14px; font-size:12px; font-weight:600; color:#6366f1; background:#fff; cursor:pointer; transition:all .15s; }
.tpl-btn:hover{ background:#6366f1; color:#fff; }
.tpl-btn.primary{ background:#1a1a2e; color:#fff; border-color:#1a1a2e; }
.tpl-btn.primary:hover{ background:#2d2d4e; }

/* SSP */
.ssp-header{ background:#fff; border:1px solid #e2e8f0; border-radius:10px; padding:20px 24px; margin-bottom:16px; }
.ssp-header h3{ font-size:13px; font-weight:700; color:#1a1a2e; margin-bottom:14px; padding-bottom:8px; border-bottom:2px solid #1a1a2e; }
.ssp-fields{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.ssp-field{ display:flex; flex-direction:column; gap:4px; }
.ssp-field.full{ grid-column:1/-1; }
.ssp-field label{ font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:#94a3b8; }
.ssp-field input,.ssp-field textarea,.ssp-field select{ border:1px solid #e2e8f0; border-radius:5px; padding:6px 10px; font-size:12px; font-family:inherit; color:#1a1a2e; background:#fafbfc; outline:none; transition:border-color .15s; }
.ssp-field input:focus,.ssp-field textarea:focus{ border-color:#6366f1; background:#fff; }
.ssp-field textarea{ resize:vertical; min-height:60px; }

.ssp-ctrl-section{ background:#fff; border:1px solid #e2e8f0; border-radius:10px; overflow:hidden; margin-bottom:14px; }
.ssp-domain-hdr{ display:flex; align-items:center; gap:10px; padding:10px 16px; color:#fff; }
.ssp-domain-badge{ font-size:11px; font-weight:800; padding:2px 8px; background:rgba(255,255,255,.2); border-radius:4px; }
.ssp-domain-name{ font-size:12px; font-weight:600; }
.ssp-domain-count{ font-size:11px; opacity:.7; margin-left:auto; }
.ssp-ctrl{ padding:12px 16px; border-bottom:1px solid #f1f5f9; }
.ssp-ctrl:last-child{ border-bottom:none; }
.ssp-ctrl-meta{ display:flex; align-items:center; gap:8px; margin-bottom:6px; flex-wrap:wrap; }
.ssp-ctrl-id{ font-family:monospace; font-size:11px; font-weight:700; color:#6366f1; }
.ssp-ctrl-summary{ font-size:12px; font-weight:600; color:#1a1a2e; flex:1; }
.ssp-status-pill{ font-size:10px; font-weight:700; padding:2px 8px; border-radius:10px; white-space:nowrap; }
.ssp-status-pill.complete{ background:#dcfce7; color:#166534; }
.ssp-status-pill.in-progress{ background:#fef3c7; color:#92400e; }
.ssp-status-pill.not-started{ background:#f1f5f9; color:#64748b; }
.ssp-pts-tag{ font-size:10px; font-weight:700; padding:2px 6px; border-radius:4px; }
.ssp-pts-tag.p5{ background:#fee2e2; color:#dc2626; }
.ssp-pts-tag.p3{ background:#fef3c7; color:#b45309; }
.ssp-pts-tag.p1{ background:#f1f5f9; color:#475569; }
.ssp-evidence{ font-size:11px; color:#64748b; line-height:1.5; margin-bottom:8px; padding:6px 10px; background:#f8fafc; border-left:3px solid #e2e8f0; border-radius:0 4px 4px 0; }
.ssp-evidence span{ font-weight:700; color:#94a3b8; font-size:10px; text-transform:uppercase; letter-spacing:.4px; margin-right:4px; }
.ssp-impl-wrap{ margin-top:6px; }
.ssp-impl-label{ font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; color:#6366f1; margin-bottom:4px; }
.ssp-impl-area{ width:100%; border:1px dashed #c7d2fe; border-radius:5px; padding:7px 10px; font-size:12px; font-family:inherit; color:#1a1a2e; background:#eef2ff; outline:none; resize:vertical; min-height:52px; transition:all .15s; }
.ssp-impl-area:focus{ border-color:#6366f1; background:#fff; border-style:solid; }
.ssp-impl-area.has-content{ background:#fff; border-color:#a5b4fc; border-style:solid; }

/* POA&M */
.poam-summary{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:16px; }
.poam-sum-card{ background:#fff; border:1px solid #e2e8f0; border-radius:8px; padding:10px 14px; text-align:center; }
.poam-sum-num{ font-size:24px; font-weight:800; }
.poam-sum-num.red{ color:#ef4444; }
.poam-sum-num.yellow{ color:#f59e0b; }
.poam-sum-num.purple{ color:#8b5cf6; }
.poam-sum-num.blue{ color:#3b82f6; }
.poam-sum-label{ font-size:10px; color:#94a3b8; text-transform:uppercase; letter-spacing:.4px; margin-top:1px; }
.poam-table-wrap{ background:#fff; border:1px solid #e2e8f0; border-radius:10px; overflow:hidden; }
.poam-table-hdr{ background:#f8fafc; padding:12px 16px; border-bottom:1px solid #e2e8f0; }
.poam-table-hdr h3{ font-size:13px; font-weight:700; color:#1a1a2e; }
.poam-table{ width:100%; border-collapse:collapse; table-layout:fixed; }
.poam-table th{ font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; color:#94a3b8; padding:8px 12px; border-bottom:1px solid #f1f5f9; text-align:left; background:#fafbfc; }
.poam-table td{ padding:8px 10px; border-bottom:1px solid #f8fafc; vertical-align:top; font-size:11px; }
.poam-table tr:last-child td{ border-bottom:none; }
.poam-table tr:hover td{ background:#fafbfc; }
.poam-input{ width:100%; border:1px solid #e2e8f0; border-radius:4px; padding:4px 7px; font-size:11px; font-family:inherit; color:#1a1a2e; background:#fafbfc; outline:none; box-sizing:border-box; }
.poam-input:focus{ border-color:#6366f1; background:#fff; }
.poam-textarea{ width:100%; border:1px solid #e2e8f0; border-radius:4px; padding:4px 7px; font-size:11px; font-family:inherit; color:#1a1a2e; background:#fafbfc; outline:none; resize:none; min-height:42px; box-sizing:border-box; }

.pol-back-btn { background:none; border:1px solid #e2e8f0; border-radius:6px; padding:6px 12px; font-size:12px; font-weight:600; color:#64748b; cursor:pointer; }
.pol-back-btn:hover { border-color:#6366f1; color:#6366f1; }

/* ── Gap Wizard ───────────────────────────────────────────── */

.wiz-card-title { font-size:14px; font-weight:700; color:#fff; flex:1; }
.wiz-card-pts { background:rgba(255,255,255,.25); color:#fff; font-size:11px; font-weight:800; padding:3px 10px; border-radius:20px; }
.wiz-progress-bar-wrap { height:4px; background:#e2e8f0; }
.wiz-progress-bar-fill { height:4px; background:#4f46e5; transition:width .3s; }

.wiz-sections { padding:0; }
.wiz-section { padding:18px 24px; border-bottom:1px solid #f1f5f9; }
.wiz-section:last-child { border-bottom:none; }
.wiz-section-label { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.7px; margin-bottom:8px; }
.wiz-section-label.blue  { color:#3b82f6; }
.wiz-section-label.green { color:#22c55e; }
.wiz-section-label.amber { color:#f59e0b; }
.wiz-section-text { font-size:13px; color:#334155; line-height:1.65; }
.wiz-steps { list-style:none; padding:0; margin:0; }
.wiz-steps li { padding:6px 0 6px 26px; font-size:13px; color:#334155; line-height:1.5; position:relative; border-bottom:1px solid #f8fafc; }
.wiz-steps li:last-child { border-bottom:none; }
.wiz-steps li::before { content:counter(step); counter-increment:step; position:absolute; left:0; top:6px; background:#4f46e5; color:#fff; font-size:9px; font-weight:800; width:16px; height:16px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
.wiz-steps { counter-reset:step; }

.wiz-nav { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; border-top:1px solid #e2e8f0; gap:8px; }
.wiz-nav-counter { font-size:12px; color:#94a3b8; font-weight:600; text-align:center; flex:1; }
.wiz-btn { border:1px solid #e2e8f0; background:#fff; border-radius:8px; padding:9px 18px; font-size:13px; font-weight:600; cursor:pointer; color:#64748b; transition:all .15s; }
.wiz-btn:hover { border-color:#6366f1; color:#4f46e5; }
.wiz-btn.primary { background:#4f46e5; border-color:#4f46e5; color:#fff; }
.wiz-btn.primary:hover { background:#4338ca; }
.wiz-btn.success { background:#22c55e; border-color:#22c55e; color:#fff; }
.wiz-btn.success:hover { background:#16a34a; }
.wiz-btn:disabled { opacity:.4; cursor:not-allowed; }

.wiz-done { background:#fff; border:1px solid #e2e8f0; border-radius:14px; padding:48px; text-align:center; }
.wiz-done-icon { font-size:48px; margin-bottom:12px; }

/* ── Table scroll wrapper ── */
.table-scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; }

/* ── Walkthrough Tour ── */
.tour-backdrop {
  position:fixed; inset:0; background:rgba(15,15,35,.72); z-index:1000;
  display:flex; align-items:center; justify-content:center; padding:16px;
  backdrop-filter:blur(2px);
  animation:tourFadeIn .2s ease;
}
.tour-backdrop.hidden { display:none; }
@keyframes tourFadeIn { from{opacity:0} to{opacity:1} }

.tour-card {
  background:#fff; border-radius:16px; width:100%; max-width:520px;
  overflow:hidden; box-shadow:0 24px 60px rgba(0,0,0,.35);
  animation:tourSlideUp .25s ease;
}
@keyframes tourSlideUp { from{transform:translateY(16px);opacity:0} to{transform:translateY(0);opacity:1} }

.tour-card-header {
  padding:28px 28px 20px;
  background:linear-gradient(135deg,#1a1a2e 0%,#4f46e5 100%);
  color:#fff; position:relative;
}
.tour-card-step-pill {
  display:inline-block; background:rgba(255,255,255,.2); border-radius:20px;
  font-size:10px; font-weight:700; letter-spacing:.6px; text-transform:uppercase;

}

.tour-card-icon { font-size:32px; margin-bottom:10px; display:block; }

.tour-card-body { padding:20px 28px 24px; }
.tour-feature-list { list-style:none; padding:0; margin:0 0 4px; }
.tour-feature-list li {
  display:flex; align-items:flex-start; gap:10px;
  padding:9px 0; border-bottom:1px solid #f1f5f9; font-size:13px; color:#334155; line-height:1.5;
}
.tour-feature-list li:last-child { border-bottom:none; }
.tour-feature-icon { font-size:16px; flex-shrink:0; margin-top:1px; }

.tour-progress-dots {
  display:flex; gap:6px; justify-content:center; padding:12px 0 0;
}
.tour-dot {
  width:7px; height:7px; border-radius:50%; background:#e2e8f0; transition:background .2s;
}
.tour-dot.active { background:#4f46e5; width:20px; border-radius:4px; }

.tour-card-footer {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 28px 20px; gap:10px;
}
.tour-skip-btn {
  background:none; border:none; font-size:12px; color:#94a3b8; cursor:pointer; padding:6px 0;
}
.tour-skip-btn:hover { color:#64748b; }
.tour-nav-btns { display:flex; gap:8px; }
.tour-prev-btn {
  border:1px solid #e2e8f0; background:#fff; border-radius:8px;
  padding:9px 18px; font-size:13px; font-weight:600; color:#64748b; cursor:pointer;
  transition:all .15s;
}
.tour-prev-btn:hover { border-color:#6366f1; color:#4f46e5; }
.tour-next-btn {
  background:#4f46e5; border:none; border-radius:8px;
  padding:9px 22px; font-size:13px; font-weight:700; color:#fff; cursor:pointer;
  transition:background .15s;
}
.tour-next-btn:hover { background:#4338ca; }

/* Help button in top bar */
.tour-help-btn {
  border:1px solid rgba(255,255,255,.25); background:transparent;
  color:rgba(255,255,255,.75); border-radius:20px; padding:4px 12px;
  font-size:11px; font-weight:600; cursor:pointer; white-space:nowrap;
  transition:all .15s;
}
.tour-help-btn:hover { background:rgba(255,255,255,.15); color:#fff; }

@media (max-width: 768px) {
  .tour-card-header { padding:20px 20px 16px; }

  .tour-card-body { padding:16px 20px 18px; }
  .tour-card-footer { padding:10px 20px 16px; }

}

/* ══════════════════════════════════════════════
   MOBILE — max-width: 768px
══════════════════════════════════════════════ */
@media (max-width: 768px) {

  /* Top bar */
  .top-bar { padding:10px 14px; }
  .top-row { flex-direction:column; align-items:flex-start; gap:8px; }

  .audit-ctrl-header { grid-template-columns:56px 1fr; grid-template-rows:auto auto; gap:4px 8px; padding:8px 12px 6px; }

  .poam-table-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }

  /* Policy index */
  .pol-index { grid-template-columns:1fr; }
  .pol-doc-header { flex-direction:column; gap:10px; }
  .pol-doc-header-right { width:100%; justify-content:flex-start; flex-wrap:wrap; }
  .pol-doc-meta { grid-template-columns:1fr; }
  .pol-sig-grid { grid-template-columns:1fr; }
  .pol-section { padding:14px 16px; }
  .pol-section-body { font-size:12px; }

  /* Wizard */

  .wiz-intro-header { padding:22px 20px; }
  .wiz-intro-header h2 { font-size:16px; }
  .wiz-intro-stats { grid-template-columns:repeat(3,1fr); }
  .wiz-stat { padding:12px 8px; }
  .wiz-stat-num { font-size:22px; }
  .wiz-intro-body { padding:18px 20px 24px; }
  .wiz-card-header { padding:14px 18px; flex-wrap:wrap; gap:8px; }
  .wiz-card-title { font-size:13px; }
  .wiz-section { padding:14px 18px; }
  .wiz-section-text { font-size:13px; }
  .wiz-steps li { font-size:12px; }
  .wiz-nav { padding:12px 18px; gap:6px; flex-wrap:wrap; }
  .wiz-btn { padding:9px 14px; font-size:12px; flex:1; text-align:center; }
  .wiz-nav-counter { order:-1; width:100%; }
  .wiz-done { padding:32px 20px; }

  /* Evidence template sub-tabs — scroll horizontally */
  .tpl-sub-tabs { overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; flex-wrap:nowrap; }
  .tpl-sub-tabs::-webkit-scrollbar { display:none; }
  .tpl-sub-btn { flex:none; min-width:140px; white-space:nowrap; border-right:1px solid #e2e8f0; }
  .tpl-export-bar { flex-direction:column; align-items:flex-start; }
  .tpl-export-btns { width:100%; display:flex; flex-wrap:wrap; gap:8px; }
  .tpl-btn { flex:1; text-align:center; min-width:120px; }
}

/* Extra small — max-width: 480px */
@media (max-width: 480px) {
  .top-titles h1 { font-size:12px; }

function isConfigured() {
  return SUPABASE_URL !== 'YOUR_SUPABASE_URL' && SUPABASE_ANON_KEY !== 'YOUR_SUPABASE_ANON_KEY';
}
function setConn(state, label) {
  const p = document.getElementById('connPill');
  const l = document.getElementById('connLabel');
  p.className = 'conn-pill ' + state;
  l.textContent = label;
}

async function initSupabase() {
  if (!isConfigured()) {
    document.getElementById('loadingOverlay').classList.add('hidden');
    buildOrgView();
    buildAuditView();
    updateAllProgress();
    setMode('wizard');
    return;
  }
  configured = true;
  try {
    const { createClient } = supabase;
    db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const [r1, r2] = await Promise.all([
      db.from('checklist_status').select('control_id,status'),
      db.from('assessment_objectives').select('objective_id,status')
    ]);
    if (r1.error) throw r1.error;
    if (r2.error) throw r2.error;
    r1.data.forEach(r => { orgStatus[r.control_id] = r.status; });
    r2.data.forEach(r => { auditStatus[r.objective_id] = r.status; });

    // Real-time sync
    db.channel('rt_all')
      .on('postgres_changes',{event:'*',schema:'public',table:'checklist_status'}, p => {
        if (p.new?.control_id) { orgStatus[p.new.control_id] = p.new.status; refreshOrgRow(p.new.control_id); updateAllProgress(); }
      })
      .on('postgres_changes',{event:'*',schema:'public',table:'assessment_objectives'}, p => {
        if (p.new?.objective_id) { auditStatus[p.new.objective_id] = p.new.status; refreshObjRow(p.new.objective_id); updateAllProgress(); }
      })
      .subscribe(s => {
        if (s==='SUBSCRIBED') setConn('live','Live — synced');
        else if (s==='CLOSED'||s==='CHANNEL_ERROR') setConn('error','Disconnected');
      });
  } catch(err) {
    console.error(err);
    setConn('error','Connection error');
  }
  try { collapsedDomains = new Set(JSON.parse(localStorage.getItem('nist_collapsed')||'[]')); } catch(e){}
  buildOrgView();
  buildAuditView();
  updateAllProgress();
  document.getElementById('loadingOverlay').classList.add('hidden');
}

function getOrg(id){ return orgStatus[id]||'not-started'; }
function getAudit(id){ return auditStatus[id]||'not-reviewed'; }

async function setOrg(id, val) {
  orgStatus[id] = val;
  refreshOrgRow(id);
  updateAllProgress();
  if (!configured||!db) return;
  const row = document.getElementById('org-row-'+id);
  if (row) row.classList.add('saving');
  try {
    const {error} = await db.from('checklist_status').upsert({control_id:id,status:val,updated_at:new Date().toISOString()},{onConflict:'control_id'});
    if (error) throw error;
  } catch(e){ console.error(e); setConn('error','Save failed'); }
  finally { if (row) row.classList.remove('saving'); }
}

async function setAuditObj(id, val) {
  auditStatus[id] = val;
  refreshObjRow(id);
  updateAuditCtrlHeader(id.replace(/\[[a-z]\]$/,''));
  updateAllProgress();
  if (!configured||!db) return;
  const row = document.getElementById('obj-row-'+id);
  if (row) row.classList.add('saving');
  try {
    const {error} = await db.from('assessment_objectives').upsert({objective_id:id,status:val,updated_at:new Date().toISOString()},{onConflict:'objective_id'});
    if (error) throw error;
  } catch(e){ console.error(e); setConn('error','Save failed'); }
  finally { if (row) row.classList.remove('saving'); }
}

async function resetAll() {
  const scope = currentMode === 'org' ? 'all 110 control statuses' : 'all 320 objective statuses';
  if (!confirm('Reset '+scope+'? This affects everyone on your team.')) return;
  if (currentMode === 'org') {
    orgStatus = {};
    CONTROLS.forEach(c => refreshOrgRow(c.id));
    if (configured && db) await db.from('checklist_status').delete().neq('control_id','__none__');
  } else {
    auditStatus = {};
    ALL_OBJECTIVES.forEach(o => refreshObjRow(o.id));
    CONTROLS.forEach(c => updateAuditCtrlHeader(c.id));
    if (configured && db) await db.from('assessment_objectives').delete().neq('objective_id','__none__');
  }
  updateAllProgress();
}

// ═══════════════════════════════════════════════════════════
// Progress
// ═══════════════════════════════════════════════════════════
function updateAllProgress() {
  const total = CONTROLS.length;
  const done  = CONTROLS.filter(c=>getOrg(c.id)==='complete').length;
  const pct   = Math.round(done/total*100);
  document.getElementById('orgProgBar').style.width = pct+'%';
  document.getElementById('orgProgLabel').textContent = done+' / '+total+' controls complete';

  const objTotal = ALL_OBJECTIVES.length;
  const met = ALL_OBJECTIVES.filter(o=>getAudit(o.id)==='met').length;
  const notMet = ALL_OBJECTIVES.filter(o=>getAudit(o.id)==='not-met').length;
  const na = ALL_OBJECTIVES.filter(o=>getAudit(o.id)==='not-applicable').length;
  const assessed = met+notMet+na;
  document.getElementById('auditSegMet').style.width = (met/objTotal*100)+'%';
  document.getElementById('auditSegNot').style.width = (notMet/objTotal*100)+'%';
  document.getElementById('auditSegNA').style.width  = (na/objTotal*100)+'%';
  document.getElementById('auditProgLabel').textContent = assessed+' / '+objTotal+' objectives assessed ('+met+' met, '+notMet+' not met, '+na+' N/A)';

  DOMAINS.forEach(d => {
    const dc = CONTROLS.filter(c=>c.domain===d);
    const ddone = dc.filter(c=>getOrg(c.id)==='complete').length;
    const fill  = document.getElementById('dfill-org-'+d)||document.getElementById('dfill-aud-'+d);
    const lbl   = document.getElementById('dlabel-org-'+d)||document.getElementById('dlabel-aud-'+d);
    if (currentMode==='org') {
      const f = document.getElementById('dfill-org-'+d);
      const l = document.getElementById('dlabel-org-'+d);
      if (f) f.style.width = Math.round(ddone/dc.length*100)+'%';
      if (l) l.textContent = ddone+'/'+dc.length;
    } else {
      const dObjs = ALL_OBJECTIVES.filter(o=>o.domain===d);
      const dMet  = dObjs.filter(o=>getAudit(o.id)==='met').length;
      const f = document.getElementById('dfill-aud-'+d);
      const l = document.getElementById('dlabel-aud-'+d);
      if (f) f.style.width = Math.round(dMet/dObjs.length*100)+'%';
      if (l) l.textContent = dMet+'/'+dObjs.length;
    }
  });

  // SPRS progress bar
  const sprsScore = computeSPRS();
  const gaugePos = Math.max(0, Math.min(100, (sprsScore+203)/313*100));
  document.getElementById('sprsProgFill').style.width = gaugePos+'%';
  document.getElementById('sprsProgLabel').textContent = 'SPRS Score: '+sprsScore+' (range: −203 to 110)';
  if (currentMode==='sprs') buildSPRSView();

  updateStats();
}

function updateStats() {
  if (currentMode === 'org') {
    const done = CONTROLS.filter(c=>getOrg(c.id)==='complete').length;
    const inProg = CONTROLS.filter(c=>getOrg(c.id)==='in-progress').length;
    document.getElementById('s1').textContent=done; document.getElementById('sl1').textContent='Complete';
    document.getElementById('s2').textContent=inProg; document.getElementById('sl2').textContent='In Progress';
    document.getElementById('s3').textContent=CONTROLS.length-done-inProg; document.getElementById('sl3').textContent='Not Started';
    document.getElementById('s4').textContent=DOMAINS.length; document.getElementById('sl4').textContent='Domains';
    document.getElementById('s1').className='stat-num green';
    document.getElementById('s2').className='stat-num yellow';
    document.getElementById('s3').className='stat-num';
  } else {
    const met=ALL_OBJECTIVES.filter(o=>getAudit(o.id)==='met').length;
    const notMet=ALL_OBJECTIVES.filter(o=>getAudit(o.id)==='not-met').length;
    const na=ALL_OBJECTIVES.filter(o=>getAudit(o.id)==='not-applicable').length;
    const nr=ALL_OBJECTIVES.length-met-notMet-na;
    document.getElementById('s1').textContent=met; document.getElementById('sl1').textContent='Met';
    document.getElementById('s2').textContent=notMet; document.getElementById('sl2').textContent='Not Met';
    document.getElementById('s3').textContent=na; document.getElementById('sl3').textContent='N/A';
    document.getElementById('s4').textContent=nr; document.getElementById('sl4').textContent='Not Reviewed';
    document.getElementById('s1').className='stat-num green';
    document.getElementById('s2').className='stat-num red';
    document.getElementById('s3').className='stat-num gray';
  }
}

function setFilter(f,btn) {
  orgFilter=f;
  document.querySelectorAll('#orgFilters .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}
function setAuditFilter(f,btn) {
  auditFilter=f;
  document.querySelectorAll('#auditFilters .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}
function applyFilters() {
  const query = document.getElementById('searchBox').value.toLowerCase();
  const domain = document.getElementById('domainFilter').value;
  if (currentMode==='org') {
    CONTROLS.forEach(c => {
      const row = document.getElementById('org-row-'+c.id);
      if (!row) return;
      const s = getOrg(c.id);
      const ok = (orgFilter==='all'||s===orgFilter)
              && (!domain||c.domain===domain)
              && (!query||c.id.includes(query)||c.summary.toLowerCase().includes(query)||c.evidence.toLowerCase().includes(query));
      row.classList.toggle('hidden',!ok);
    });
  } else {
    CONTROLS.forEach(c => {
      const block = document.getElementById('audit-ctrl-'+c.id);
      if (!block) return;
      const matchDomain = !domain||c.domain===domain;
      const matchSearch = !query||c.id.includes(query)||c.summary.toLowerCase().includes(query);
      // For audit filter, show block if any objective matches
      const objs = OBJECTIVES[c.id]||[];
      const matchFilter = auditFilter==='all'||objs.some(([l])=>getAudit(c.id+'['+l+']')===auditFilter);
      const ok = matchDomain && matchSearch && matchFilter;
      block.classList.toggle('hidden',!ok);
      // Filter individual objective rows
      objs.forEach(([l,t]) => {
        const oRow = document.getElementById('obj-row-'+c.id+'['+l+']');
        if (!oRow) return;
        const os = getAudit(c.id+'['+l+']');
        const objOk = (auditFilter==='all'||os===auditFilter)
                   && (!query||t.toLowerCase().includes(query)||c.id.includes(query));
        oRow.classList.toggle('hidden',!objOk);
      });
    });
  }
}

function toggleDomain(key, bodyId, chevId) {
  const body = document.getElementById(bodyId);
  const chev = document.getElementById(chevId);
  if (!body) return;
  const isNowCollapsed = body.style.display === 'none';
  body.style.display = isNowCollapsed ? '' : 'none';
  if (chev) chev.className='chevron'+(isNowCollapsed?' open':'');
  if (isNowCollapsed) collapsedDomains.delete(key); else collapsedDomains.add(key);
  try { localStorage.setItem('nist_collapsed',JSON.stringify([...collapsedDomains])); } catch(e) {}
}

function toggleAuditCtrl(ctrlId) {
  const list = document.getElementById('obj-list-'+ctrlId);
  const chev = document.getElementById('ctrl-chev-'+ctrlId);
  if (!list) return;
  const isNowOpen = !list.classList.contains('open');
  list.classList.toggle('open', isNowOpen);
  if (chev) chev.classList.toggle('open', isNowOpen);
  if (isNowOpen) expandedControls.add(ctrlId); else expandedControls.delete(ctrlId);
}

function toggleEvidence(id) {
  const el  = document.getElementById('ev-'+id);
  const btn = document.getElementById('ev-btn-'+id);
  if (!el) return;
  if (expandedEvidence.has(id)) {
    expandedEvidence.delete(id);
    el.classList.remove('visible');
    btn.textContent='▸ Show evidence needed';
  } else {
    expandedEvidence.add(id);
    el.classList.add('visible');
    btn.textContent='▾ Hide evidence';
  }
}

// ═══════════════════════════════════════════════════════════
// SPRS Calculator
// ═══════════════════════════════════════════════════════════
function getSprsWeight(id) {
  const w = SPRS_WEIGHTS[id];
  if (w === undefined) return 1;          // 1-point default
  if (w === 'special') return 5;          // worst-case for special
  return w;
}

function computeSPRS() {
  let score = 110;
  CONTROLS.forEach(c => {
    if (getOrg(c.id) === 'complete') return;
    const w = SPRS_WEIGHTS[c.id];
    if (w === 0) return;                  // 3.12.4 — no deduction
    if (w === 'special') {
      score -= (sprsPartial[c.id] === 'partial') ? 3 : 5;
    } else {
      score -= (w === undefined ? 1 : w);
    }
  });
  return score;
}

function sprsPointsAtRisk() {
  let risk = 0;
  CONTROLS.forEach(c => {
    if (getOrg(c.id) === 'complete') return;
    const w = SPRS_WEIGHTS[c.id];
    if (w === 0) return;
    risk += (w === 'special') ? (sprsPartial[c.id]==='partial' ? 3 : 5) : (w===undefined ? 1 : w);
  });
  return risk;
}

function sprsPointsSecured() {
  let pts = 0;
  CONTROLS.forEach(c => {
    if (getOrg(c.id) !== 'complete') return;
    const w = SPRS_WEIGHTS[c.id];
    if (w === 0) return;
    pts += (w === 'special') ? 5 : (w===undefined ? 1 : w);
  });
  return pts;
}

function criticalGaps() {
  return CONTROLS.filter(c =>
    getOrg(c.id) !== 'complete' &&
    (SPRS_WEIGHTS[c.id] === 5 || SPRS_WEIGHTS[c.id] === 'special')
  ).length;
}

function setSPRSPartial(id, val) {
  sprsPartial[id] = val;
  buildSPRSView();
  updateAllProgress();
}

function buildSPRSView() {
  const container = document.getElementById('sprsView');
  if (!container) return;

  const score    = computeSPRS();
  const risk     = sprsPointsAtRisk();
  const secured  = sprsPointsSecured();
  const crit     = criticalGaps();
  const notDone  = CONTROLS.filter(c=>getOrg(c.id)!=='complete').length;

  const scoreClass = score >= 88 ? 's-green' : score >= 50 ? 's-yellow' : score >= 0 ? 's-orange' : 's-red';
  const gaugeClass = score >= 88 ? 'g-green' : score >= 50 ? 'g-yellow' : score >= 0 ? 'g-orange' : 'g-red';
  const gaugeW  = Math.max(0, Math.min(100, (score + 203) / 313 * 100)).toFixed(1);
  const cmmc88  = ((88 + 203) / 313 * 100).toFixed(1);   // 93% along bar
  const zeroPos = ((0  + 203) / 313 * 100).toFixed(1);   // 64.9% along bar

  // Status label
  let statusLabel, statusColor;
  if (score >= 110) { statusLabel = 'Fully Compliant'; statusColor='#4ade80'; }
  else if (score >= 88) { statusLabel = 'CMMC Level 2 Eligible (conditional)'; statusColor='#86efac'; }
  else if (score >= 50) { statusLabel = 'Moderate Gaps — remediation needed'; statusColor='#facc15'; }
  else if (score >= 0)  { statusLabel = 'Significant Gaps — urgent action'; statusColor='#fb923c'; }
  else                   { statusLabel = 'Critical Deficiencies — high risk'; statusColor='#f87171'; }

  // Special controls section
  let specialHtml = '';
  const specials = [
    { id:'3.5.3', label:'3.5.3 – Multi-Factor Authentication',
      opts:[
        {val:'full',    text:'No MFA implemented (−5 pts)'},
        {val:'partial', text:'MFA for remote/privileged users only (−3 pts)'},
        {val:'complete',text:'MFA for all users — fully implemented (0 pts)'}
      ]
    },
    { id:'3.13.11', label:'3.13.11 – FIPS-Validated Cryptography',
      opts:[
        {val:'full',    text:'No encryption employed (−5 pts)'},
        {val:'partial', text:'Encryption used, not FIPS-validated (−3 pts)'},
        {val:'complete',text:'FIPS 140-2/3 validated encryption in use (0 pts)'}
      ]
    }
  ];
  const specialRows = specials.filter(sp => getOrg(sp.id) !== 'complete' || sprsPartial[sp.id] === 'partial');
  if (specialRows.length) {
    specialHtml = `<div class="sprs-special-notice">
      <strong>⚡ Two controls offer partial credit — set your actual implementation level:</strong>
      ${specialRows.map(sp => {
        const cur = getOrg(sp.id)==='complete' ? 'complete' : (sprsPartial[sp.id]||'full');
        return `<div class="sprs-special-row">
          <strong style="font-size:12px;min-width:300px">${sp.label}</strong>
          <span class="sprs-special-badge">partial credit available</span>
          <select class="sprs-special-select" onchange="setSPRSPartial('${sp.id}',this.value)">
            ${sp.opts.map(o=>`<option value="${o.val}"${cur===o.val?' selected':''}>${o.text}</option>`).join('')}
          </select>
        </div>`;
      }).join('')}
    </div>`;
  }

  // Remediation table — sorted: incomplete first by pts desc, then complete
  const rows = CONTROLS.map(c => {
    const s   = getOrg(c.id);
    const wRaw = SPRS_WEIGHTS[c.id];
    let pts;
    if (wRaw === 0) pts = 0;
    else if (wRaw === 'special') pts = (sprsPartial[c.id]==='partial' ? 3 : (s==='complete' ? 0 : 5));
    else pts = (wRaw===undefined ? 1 : wRaw);
    return { c, s, pts, wRaw };
  }).sort((a, b) => {
    if (a.s==='complete' && b.s!=='complete') return 1;
    if (a.s!=='complete' && b.s==='complete') return -1;
    return b.pts - a.pts || a.c.id.localeCompare(b.c.id, undefined, {numeric:true});
  });

  const tableRows = rows.map(({c, s, pts, wRaw}) => {
    const isComplete  = s === 'complete';
    const pClass      = pts===5?'p5':pts===3?'p3':pts===1?'p1':'p0';
    const pLabel      = pts===0 ? '—' : pts;
    const isSpecial   = wRaw === 'special';
    const domColor    = DOMAIN_META[c.domain]?.color||'#64748b';
    const statusCell  = isComplete
      ? '<span style="color:#22c55e;font-weight:700;font-size:11px">✓ Done</span>'
      : `<span class="sprs-status-chip ${s}">${s==='not-started'?'Not Started':'In Progress'}</span>`;
    return `<tr class="${isComplete?'complete-row':''}">
      <td><span class="sprs-ctrl-id">${c.id}</span></td>
      <td><span class="sprs-pts-badge ${pClass}">${pLabel}</span>${isSpecial?'<span class="sprs-special-badge" style="margin-left:3px">⚡</span>':''}</td>
      <td><span class="sprs-ctrl-summary">${c.summary}</span></td>
      <td><span class="sprs-domain-chip" style="background:${domColor}">${c.domain}</span></td>
      <td>${statusCell}</td>
    </tr>`;
  }).join('');

  container.innerHTML = `
    <div class="sprs-header-card">
      <div class="sprs-top-row">
        <div class="sprs-score-block">
          <div class="sprs-score-label">SPRS Score</div>
          <div class="sprs-score-value ${scoreClass}">${score}</div>

          <div class="sprs-stat-label">Pts Secured</div>
        </div>
        <div class="sprs-stat-card">
          <div class="sprs-stat-num red">${risk}</div>
          <div class="sprs-stat-label">Pts at Risk</div>
        </div>

    ${specialHtml}

        <div>
          <div class="sprs-table-title">Prioritized Remediation — Highest Point Value First</div>

          <th style="width:64px">Points</th>
          <th>Requirement</th>
          <th style="width:52px">Domain</th>

  `;
}

// ═══════════════════════════════════════════════════════════
// Evidence Templates — localStorage helpers
// ═══════════════════════════════════════════════════════════
let tplTab = 'ssp';  // 'ssp' | 'poam' | 'policies'

function getTplOrg() {
  try { return JSON.parse(localStorage.getItem('nist_tpl_org')||'{}'); } catch(e){ return {}; }
}
function saveTplOrg(key, val) {
  const d = getTplOrg(); d[key]=val;
  try { localStorage.setItem('nist_tpl_org', JSON.stringify(d)); } catch(e){}
}
function getSspImpl(ctrlId) {
  try { return localStorage.getItem('nist_ssp_impl_'+ctrlId)||''; } catch(e){ return ''; }
}
function saveSspImpl(ctrlId, val) {
  try { localStorage.setItem('nist_ssp_impl_'+ctrlId, val); } catch(e){}
}
function getPoamField(ctrlId, field) {
  try { const d=JSON.parse(localStorage.getItem('nist_poam_'+ctrlId)||'{}'); return d[field]||''; } catch(e){ return ''; }
}
function savePoamField(ctrlId, field, val) {
  try {
    const d=JSON.parse(localStorage.getItem('nist_poam_'+ctrlId)||'{}');
    d[field]=val;
    localStorage.setItem('nist_poam_'+ctrlId, JSON.stringify(d));
  } catch(e){}
}

// ═══════════════════════════════════════════════════════════
// Evidence Templates — view builder
// ═══════════════════════════════════════════════════════════
function setTplTab(tab) {
  tplTab = tab;
  buildTemplatesView();
}

function buildTemplatesView() {
  const container = document.getElementById('templatesView');
  if (!container) return;

  // Summary counts for POA&M
  const incomplete = CONTROLS.filter(c=>getOrg(c.id)!=='complete');
  const fivePt   = incomplete.filter(c=>(SPRS_WEIGHTS[c.id]===5||SPRS_WEIGHTS[c.id]==='special')).length;
  const threePt  = incomplete.filter(c=>SPRS_WEIGHTS[c.id]===3).length;
  const onePt    = incomplete.filter(c=>SPRS_WEIGHTS[c.id]===undefined||(SPRS_WEIGHTS[c.id]!==5&&SPRS_WEIGHTS[c.id]!==3&&SPRS_WEIGHTS[c.id]!==0&&SPRS_WEIGHTS[c.id]!=='special')).length;
  const complete = CONTROLS.filter(c=>getOrg(c.id)==='complete').length;
  const org = getTplOrg();

  let content = '';
  if (tplTab==='ssp')      content = buildSSPView(org, complete);
  else if (tplTab==='poam') content = buildPOAMView(org, incomplete, fivePt, threePt, onePt);
  else                      content = buildPoliciesView(org);

  container.innerHTML = `
    <div class="tpl-wrap">
      <div class="tpl-sub-tabs">
        <button class="tpl-sub-btn${tplTab==='ssp'?' active':''}" onclick="setTplTab('ssp')">📋 System Security Plan</button>
        <button class="tpl-sub-btn${tplTab==='poam'?' active':''}" onclick="setTplTab('poam')">📌 POA&amp;M</button>
        <button class="tpl-sub-btn${tplTab==='policies'?' active':''}" onclick="setTplTab('policies')">📜 Policy Documents</button>
      </div>
      ${content}
    </div>
  `;
}

function buildSSPView(org, complete) {
  const orgName   = org.orgName   || '';
  const sysName   = org.sysName   || '';
  const sysOwner  = org.sysOwner  || '';
  const sysEnv    = org.sysEnv    || '';
  const sysScope  = org.sysScope  || '';
  const sysDesc   = org.sysDesc   || '';
  const sspVer    = org.sspVer    || '1.0';
  const sspDate   = org.sspDate   || new Date().toISOString().slice(0,10);
  const totalScore = computeSPRS();
  const scoreColor = totalScore>=88?'#22c55e':totalScore>=50?'#f59e0b':totalScore>=0?'#f97316':'#ef4444';

  const domainSections = DOMAINS.map(domain => {
    const meta = DOMAIN_META[domain];
    const dc = CONTROLS.filter(c=>c.domain===domain);
    const doneCount = dc.filter(c=>getOrg(c.id)==='complete').length;
    const ctrlRows = dc.map(c => {
      const s = getOrg(c.id);
      const wRaw = SPRS_WEIGHTS[c.id];
      const pts = wRaw==='special'?5:(wRaw===undefined?1:wRaw);
      const pClass = pts===5?'p5':pts===3?'p3':'p1';
      const impl = getSspImpl(c.id);
      const implClass = impl ? 'has-content' : '';
      return `<div class="ssp-ctrl">
        <div class="ssp-ctrl-meta">
          <span class="ssp-ctrl-id">${c.id}</span>
          <span class="ssp-pts-tag ${pClass}">${pts===0?'—':pts+' pt'}</span>
          <span class="ssp-ctrl-summary">${c.summary}</span>
          <span class="ssp-status-pill ${s}">${s==='complete'?'✓ Implemented':s==='in-progress'?'⚡ In Progress':'✗ Not Implemented'}</span>
        </div>
        <div class="ssp-evidence"><span>Evidence Required:</span>${c.evidence}</div>
        <div class="ssp-impl-wrap">
          <div class="ssp-impl-label">Implementation Description</div>
          <textarea class="ssp-impl-area ${implClass}" rows="3"
            placeholder="Describe how this control is implemented in your environment. Include tools, processes, responsible personnel, and specific configurations…"
            onchange="saveSspImpl('${c.id}',this.value); this.classList.toggle('has-content',!!this.value)"
            onfocus="this.rows=4">${escHtml(impl)}</textarea>
        </div>
      </div>`;
    }).join('');

    return `<div class="ssp-ctrl-section">
      <div class="ssp-domain-hdr" style="background:${meta.color}">
        <span class="ssp-domain-badge">${domain}</span>
        <span class="ssp-domain-name">${meta.name}</span>
        <span class="ssp-domain-count">${doneCount}/${dc.length} implemented</span>
      </div>
      ${ctrlRows}
    </div>`;
  }).join('');

  return `
    <div class="tpl-export-bar">
      <h2>System Security Plan — NIST SP 800-171 Rev 2</h2>
      <div class="tpl-export-btns">
        <button class="tpl-btn" onclick="clearSspImpl()">Clear Notes</button>
        <button class="tpl-btn primary" onclick="printSSP()">🖨 Print / Export PDF</button>
      </div>
    </div>

    <div class="ssp-header">
      <h3>System Information &amp; Organization Details</h3>
      <div class="ssp-fields">
        <div class="ssp-field"><label>Organization Name</label>
          <input type="text" value="${escHtml(orgName)}" placeholder="Your company or organization name"
            oninput="saveTplOrg('orgName',this.value)"></div>
        <div class="ssp-field"><label>System / Application Name</label>
          <input type="text" value="${escHtml(sysName)}" placeholder="Name of the covered system or enclave"
            oninput="saveTplOrg('sysName',this.value)"></div>
        <div class="ssp-field"><label>System Owner / ISSO</label>
          <input type="text" value="${escHtml(sysOwner)}" placeholder="Name and title of the system owner"
            oninput="saveTplOrg('sysOwner',this.value)"></div>
        <div class="ssp-field"><label>SSP Version</label>
          <input type="text" value="${escHtml(sspVer)}" placeholder="1.0"
            oninput="saveTplOrg('sspVer',this.value)"></div>
        <div class="ssp-field"><label>Date</label>
          <input type="date" value="${escHtml(sspDate)}"
            oninput="saveTplOrg('sspDate',this.value)"></div>
        <div class="ssp-field"><label>Current SPRS Score</label>
          <input type="text" value="${totalScore}" style="color:${scoreColor};font-weight:800" readonly></div>
        <div class="ssp-field full"><label>System Boundary / Scope</label>
          <textarea placeholder="Describe the boundary of the system — what hardware, software, networks, and data are in scope for CUI protection…"
            oninput="saveTplOrg('sysScope',this.value)">${escHtml(sysScope)}</textarea></div>
        <div class="ssp-field full"><label>System Environment Description</label>
          <textarea placeholder="Describe the operating environment — on-premise, cloud, hybrid, network topology, key technologies in use…"
            oninput="saveTplOrg('sysEnv',this.value)">${escHtml(sysEnv)}</textarea></div>
        <div class="ssp-field full"><label>System Description / Purpose</label>
          <textarea placeholder="Brief description of the system's mission and how it supports your DoD contract work…"
            oninput="saveTplOrg('sysDesc',this.value)">${escHtml(sysDesc)}</textarea></div>
      </div>
    </div>

    <div style="font-size:12px;color:#64748b;margin-bottom:14px;padding:8px 14px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:6px">
      💡 <strong>Tip:</strong> Fill in each "Implementation Description" below to document <em>how</em> your organization meets the control — this is what a C3PAO assessor reads.
      ${complete < CONTROLS.length ? `<span style="color:#dc2626"> ${CONTROLS.length-complete} controls are not yet marked complete — those will appear as POA&M items.</span>` : ' <span style="color:#16a34a">All 110 controls marked complete!</span>'}
    </div>

    ${domainSections}
  `;
}

function buildPOAMView(org, incomplete, fivePt, threePt, onePt) {
  const totalPts = incomplete.reduce((sum,c) => {
    const w=SPRS_WEIGHTS[c.id]; return sum+(w==='special'?5:w===0?0:w===undefined?1:w);
  }, 0);
  const orgName = org.orgName||'[Organization Name]';
  const sspDate = org.sspDate||new Date().toISOString().slice(0,10);

  if (!incomplete.length) {
    return `<div class="tpl-export-bar"><h2>Plan of Action &amp; Milestones (POA&amp;M)</h2></div>
      <div style="background:#f0fdf4;border:1px solid #86efac;border-radius:10px;padding:32px;text-align:center;color:#166534">
        <div style="font-size:32px;margin-bottom:8px">🎉</div>
        <div style="font-size:16px;font-weight:700">All 110 controls marked complete!</div>
        <div style="font-size:13px;margin-top:4px">No POA&amp;M items — your SPRS score is 110.</div>
      </div>`;
  }

  // Sort by SPRS weight desc
  const sorted = [...incomplete].sort((a,b) => {
    const wa=SPRS_WEIGHTS[a.id]; const wb=SPRS_WEIGHTS[b.id];
    const pa=wa==='special'?5:wa===undefined?1:wa;
    const pb=wb==='special'?5:wb===undefined?1:wb;
    return pb-pa || a.id.localeCompare(b.id,undefined,{numeric:true});
  });

  let poamIdNum = 1;
  const tableRows = sorted.map(c => {
    const s = getOrg(c.id);
    const wRaw = SPRS_WEIGHTS[c.id];
    const pts = wRaw==='special'?(sprsPartial[c.id]==='partial'?3:5):(wRaw===0?0:wRaw===undefined?1:wRaw);
    const pClass = pts>=5?'p5':pts>=3?'p3':'p1';
    const pid = String(poamIdNum++).padStart(3,'0');

    const weakness  = getPoamField(c.id,'weakness')  || `${c.summary} — This control has not been fully implemented. Required evidence includes: ${c.evidence.split(';')[0].trim()}.`;
    const respParty = getPoamField(c.id,'respParty') || '';
    const planDate  = getPoamField(c.id,'planDate')  || '';
    const resources = getPoamField(c.id,'resources') || '';
    const milestone = getPoamField(c.id,'milestone') || '';
    const poamStatus= getPoamField(c.id,'poamStatus')|| s;
    const domColor  = DOMAIN_META[c.domain]?.color||'#64748b';

    return `<tr>
      <td style="white-space:nowrap">
        <div style="color:#94a3b8;font-size:9px;font-weight:700">POA&amp;M-${pid}</div>
        <span class="poam-id">${c.id}</span><br>
        <span class="poam-pts-badge ${pClass}">${pts===0?'—':pts}</span>
        <span style="display:inline-block;font-size:9px;font-weight:700;color:#fff;padding:1px 5px;border-radius:3px;background:${domColor};margin-left:2px">${c.domain}</span>
      </td>
      <td style="font-size:11px;color:#334155;line-height:1.4">${c.summary}</td>
      <td><textarea class="poam-textarea" rows="3" onchange="savePoamField('${c.id}','weakness',this.value)">${escHtml(weakness)}</textarea></td>
      <td><input class="poam-input" type="text" value="${escHtml(respParty)}" placeholder="Name / Role" oninput="savePoamField('${c.id}','respParty',this.value)"><br><br>
          <input class="poam-input" type="date" value="${escHtml(planDate)}" title="Planned completion date" oninput="savePoamField('${c.id}','planDate',this.value)"></td>
      <td><input class="poam-input" type="text" value="${escHtml(resources)}" placeholder="Budget, tools, personnel…" oninput="savePoamField('${c.id}','resources',this.value)"><br><br>
          <textarea class="poam-textarea" rows="2" placeholder="Key milestones…" onchange="savePoamField('${c.id}','milestone',this.value)">${escHtml(milestone)}</textarea></td>
      <td>
        <select class="poam-status-select" onchange="savePoamField('${c.id}','poamStatus',this.value)">
          <option value="not-started"${poamStatus==='not-started'?' selected':''}>Not Started</option>
          <option value="in-progress"${poamStatus==='in-progress'?' selected':''}>In Progress</option>
          <option value="ongoing"${poamStatus==='ongoing'?' selected':''}>Ongoing</option>
        </select>
      </td>
    </tr>`;
  }).join('');

  return `
    <div class="tpl-export-bar">
      <h2>Plan of Action &amp; Milestones (POA&amp;M)</h2>
      <div class="tpl-export-btns">
        <button class="tpl-btn primary" onclick="printPOAM()">🖨 Print / Export PDF</button>
      </div>
    </div>

    <div class="poam-summary">
      <div class="poam-sum-card"><div class="poam-sum-num red">${incomplete.length}</div><div class="poam-sum-label">Open Items</div></div>
      <div class="poam-sum-card"><div class="poam-sum-num red">${fivePt}</div><div class="poam-sum-label">Critical (5-pt)</div></div>
      <div class="poam-sum-card"><div class="poam-sum-num yellow">${threePt}</div><div class="poam-sum-label">Important (3-pt)</div></div>
      <div class="poam-sum-card"><div class="poam-sum-num purple">${totalPts}</div><div class="poam-sum-label">SPRS Pts at Risk</div></div>
    </div>

    <div class="poam-table-wrap">
      <div class="poam-table-hdr">
        <h3>POA&amp;M — ${orgName} &nbsp;·&nbsp; NIST SP 800-171 Rev 2 &nbsp;·&nbsp; Assessment Date: ${sspDate}</h3>
      </div>
      <div style="overflow-x:auto">
        <table class="poam-table">
          <thead><tr>
            <th style="width:90px">POA&M ID / Control</th>
            <th style="width:180px">Requirement</th>
            <th style="width:220px">Weakness / Gap Description</th>
            <th style="width:130px">Responsible Party &amp; Planned Date</th>
            <th style="width:160px">Resources &amp; Milestones</th>
            <th style="width:90px">Status</th>
          </tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    </div>
  `;
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function clearSspImpl() {
  if (!confirm('Clear all implementation description notes? This cannot be undone.')) return;
  CONTROLS.forEach(c => { try { localStorage.removeItem('nist_ssp_impl_'+c.id); } catch(e){} });
  buildTemplatesView();
}

function printSSP() {
  const org = getTplOrg();
  const orgName = org.orgName||'[Organization Name]';
  const sysName = org.sysName||'[System Name]';
  const sspDate = org.sspDate||new Date().toISOString().slice(0,10);
  const score   = computeSPRS();
  const complete = CONTROLS.filter(c=>getOrg(c.id)==='complete').length;

  let body = `<h1 style="font-size:18pt;margin-bottom:4px">System Security Plan</h1>
    <h2 style="font-size:13pt;font-weight:normal;color:#555;margin-bottom:20px">NIST SP 800-171 Rev 2 — CMMC Level 2</h2>
    <table style="width:100%;border-collapse:collapse;margin-bottom:24px;font-size:10pt">
      <tr><td style="padding:4px 8px;border:1px solid #ccc;width:30%;background:#f5f5f5;font-weight:bold">Organization</td><td style="padding:4px 8px;border:1px solid #ccc">${escHtml(orgName)}</td></tr>
      <tr><td style="padding:4px 8px;border:1px solid #ccc;background:#f5f5f5;font-weight:bold">System Name</td><td style="padding:4px 8px;border:1px solid #ccc">${escHtml(sysName)}</td></tr>
      <tr><td style="padding:4px 8px;border:1px solid #ccc;background:#f5f5f5;font-weight:bold">System Owner</td><td style="padding:4px 8px;border:1px solid #ccc">${escHtml(org.sysOwner||'')}</td></tr>
      <tr><td style="padding:4px 8px;border:1px solid #ccc;background:#f5f5f5;font-weight:bold">Version / Date</td><td style="padding:4px 8px;border:1px solid #ccc">${escHtml(org.sspVer||'1.0')} &nbsp;·&nbsp; ${escHtml(sspDate)}</td></tr>
      <tr><td style="padding:4px 8px;border:1px solid #ccc;background:#f5f5f5;font-weight:bold">SPRS Score</td><td style="padding:4px 8px;border:1px solid #ccc;font-weight:bold">${score} / 110 &nbsp;(${complete}/110 controls implemented)</td></tr>
      <tr><td style="padding:4px 8px;border:1px solid #ccc;background:#f5f5f5;font-weight:bold">System Scope</td><td style="padding:4px 8px;border:1px solid #ccc">${escHtml(org.sysScope||'')}</td></tr>
      <tr><td style="padding:4px 8px;border:1px solid #ccc;background:#f5f5f5;font-weight:bold">Environment</td><td style="padding:4px 8px;border:1px solid #ccc">${escHtml(org.sysEnv||'')}</td></tr>
      <tr><td style="padding:4px 8px;border:1px solid #ccc;background:#f5f5f5;font-weight:bold">System Description</td><td style="padding:4px 8px;border:1px solid #ccc">${escHtml(org.sysDesc||'')}</td></tr>
    </table>`;

  DOMAINS.forEach(domain => {
    const meta = DOMAIN_META[domain];
    const dc = CONTROLS.filter(c=>c.domain===domain);
    body += `<h2 style="font-size:12pt;background:${meta.color};color:#fff;padding:6px 12px;margin:18px 0 0 0">${domain} — ${meta.name}</h2>`;
    body += `<table style="width:100%;border-collapse:collapse;font-size:9.5pt;margin-bottom:4px">`;
    dc.forEach(c => {
      const s = getOrg(c.id);
      const impl = getSspImpl(c.id)||'[Implementation description not yet provided]';
      const statusBg = s==='complete'?'#dcfce7':s==='in-progress'?'#fef3c7':'#fee2e2';
      const statusTxt = s==='complete'?'Implemented':s==='in-progress'?'In Progress':'Not Implemented';
      body += `<tr><td style="border:1px solid #ccc;padding:6px 8px;vertical-align:top;width:90px">
          <strong>${c.id}</strong><br>
          <span style="background:${statusBg};padding:1px 5px;border-radius:3px;font-size:8pt">${statusTxt}</span>
        </td><td style="border:1px solid #ccc;padding:6px 8px;vertical-align:top">
          <strong>${c.summary}</strong><br>
          <em style="color:#555;font-size:8.5pt">Evidence: ${c.evidence}</em><br><br>
          <span style="color:#1d4ed8;font-size:8.5pt;font-weight:bold">Implementation:</span> ${escHtml(impl)}
        </td></tr>`;
    });
    body += `</table>`;
  });

  openPrint('System Security Plan — '+orgName, body);
}

function printPOAM() {
  const org = getTplOrg();
  const orgName = org.orgName||'[Organization Name]';
  const sspDate = org.sspDate||new Date().toISOString().slice(0,10);
  const incomplete = CONTROLS.filter(c=>getOrg(c.id)!=='complete')
    .sort((a,b)=>{ const wa=SPRS_WEIGHTS[a.id],wb=SPRS_WEIGHTS[b.id];
      const pa=wa==='special'?5:wa===undefined?1:wa, pb=wb==='special'?5:wb===undefined?1:wb;
      return pb-pa||a.id.localeCompare(b.id,undefined,{numeric:true}); });

  let rows=''; let n=1;
  incomplete.forEach(c => {
    const wRaw=SPRS_WEIGHTS[c.id];
    const pts=wRaw==='special'?(sprsPartial[c.id]==='partial'?3:5):(wRaw===0?0:wRaw===undefined?1:wRaw);
    const weakness   = getPoamField(c.id,'weakness')||`${c.summary} — not fully implemented.`;
    const respParty  = getPoamField(c.id,'respParty')||'';
    const planDate   = getPoamField(c.id,'planDate')||'';
    const resources  = getPoamField(c.id,'resources')||'';
    const milestone  = getPoamField(c.id,'milestone')||'';
    const poamStatus = getPoamField(c.id,'poamStatus')||getOrg(c.id);
    rows += `<tr>
      <td style="border:1px solid #ccc;padding:4px 6px;font-size:8pt">POA&M-${String(n++).padStart(3,'0')}<br><strong>${c.id}</strong><br>${pts}pt / ${c.domain}</td>

}

function openPrint(title, body) {
  const win = window.open('','_blank','width=1000,height=750');
  win.document.write(`<!DOCTYPE html><html><head><title>${escHtml(title)}</title>
    <style>
      body{font-family:Arial,sans-serif;margin:20mm;font-size:10pt;color:#111}
      @media print{body{margin:10mm}}
      h1,h2{margin-top:0}
      table{page-break-inside:avoid}
    </style></head><body>${body}</body></html>`);
  win.document.close();
  win.focus();
  setTimeout(()=>win.print(), 600);
}

// ═══════════════════════════════════════════════════════════
// Policy Templates — localStorage helpers
// ═══════════════════════════════════════════════════════════
function getPolStatus(polId) {
  try { return localStorage.getItem('nist_pol_status_'+polId)||'draft'; } catch(e){ return 'draft'; }
}
function savePolStatus(polId, val) {
  try { localStorage.setItem('nist_pol_status_'+polId, val); } catch(e){}
}
function getPolField(polId, field) {
  try { const d=JSON.parse(localStorage.getItem('nist_pol_'+polId)||'{}'); return d[field]||''; } catch(e){ return ''; }
}
function savePolField(polId, field, val) {
  try {
    const d=JSON.parse(localStorage.getItem('nist_pol_'+polId)||'{}');
    d[field]=val; localStorage.setItem('nist_pol_'+polId, JSON.stringify(d));
  } catch(e){}
}

// ═══════════════════════════════════════════════════════════
// Policy Templates — view builder
// ═══════════════════════════════════════════════════════════
let currentPolicyId = null;

function buildPoliciesView(org) {
  if (currentPolicyId) return buildPolicyDoc(org, currentPolicyId);
  return buildPolicyIndex(org);
}

function buildPolicyIndex(org) {
  const approved = POLICIES.filter(p=>getPolStatus(p.id)==='approved').length;
  const na       = POLICIES.filter(p=>getPolStatus(p.id)==='na').length;
  const draft    = POLICIES.length - approved - na;

  const orgName = org.orgName||'[Organization Name]';
  const sspDate = org.sspDate||new Date().toISOString().slice(0,10);

  const cards = POLICIES.map(p => {
    const s = getPolStatus(p.id);
    const meta = DOMAIN_META[p.domain]||{color:'#64748b'};
    const sLabel = s==='approved'?'✓ Approved':s==='na'?'N/A':'Draft';
    return `<div class="pol-card" onclick="openPolicy('${p.id}')">
      <div class="pol-card-domain" style="color:${meta.color}">${p.domain} — ${meta.name||p.shortTitle}</div>
      <div class="pol-card-title">${p.title}</div>
      <div class="pol-card-desc">${p.why.slice(0,90)}…</div>
      <div class="pol-card-footer">
        <span class="pol-status-badge ${s}">${sLabel}</span>
        <span class="pol-card-controls">${p.controlCount} controls</span>
      </div>
    </div>`;
  }).join('');

  return `
    <div class="tpl-export-bar">
      <h2>Policy Documents — NIST SP 800-171 Rev 2</h2>
      <div class="tpl-export-btns">
        <button class="tpl-btn primary" onclick="printAllPolicies()">🖨 Print All Policies</button>
      </div>
    </div>

    <div class="pol-overall">
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700;color:#1e293b;margin-bottom:3px">Audit Package Policy Status — ${orgName}</div>
        <div style="font-size:11px;color:#64748b">A C3PAO assessor will verify that each policy document exists, is approved, and has been communicated to personnel.</div>
      </div>
      <div class="pol-overall-stat"><div class="pol-overall-num" style="color:#22c55e">${approved}</div><div class="pol-overall-lbl">Approved</div></div>
      <div class="pol-overall-stat"><div class="pol-overall-num" style="color:#f59e0b">${draft}</div><div class="pol-overall-lbl">Draft</div></div>
      <div class="pol-overall-stat"><div class="pol-overall-num" style="color:#94a3b8">${na}</div><div class="pol-overall-lbl">N/A</div></div>
    </div>

    <div class="pol-index">${cards}</div>
  `;
}

function openPolicy(id) {
  currentPolicyId = id;
  buildTemplatesView();
}
function closePolicy() {
  currentPolicyId = null;
  buildTemplatesView();
}

function buildPolicyDoc(org, polId) {

  const sspDate   = org.sspDate   || new Date().toISOString().slice(0,10);
  const meta      = DOMAIN_META[p.domain]||{color:'#64748b'};
  const status    = getPolStatus(p.id);

  // Persisted overrides
  const customPurpose  = getPolField(p.id,'purpose')   || p.purpose.replace(/\[ORG NAME\]/g, orgName);
  const customScope    = getPolField(p.id,'scope')     || p.scope.replace(/\[ORG NAME\]/g, orgName);
  const polVer         = getPolField(p.id,'version')   || '1.0';
  const polDate        = getPolField(p.id,'date')      || sspDate;

  const reqItems = p.requirements.map(r=>`<li>${r}</li>`).join('');
  const roleRows = p.roles.map(r=>`<tr>
    <td style="border:1px solid #e2e8f0;padding:8px 12px;font-weight:600;font-size:12px;white-space:nowrap;vertical-align:top">${r.role}</td>
    <td style="border:1px solid #e2e8f0;padding:8px 12px;font-size:12px;color:#334155">${r.responsibility}</td>
  </tr>`).join('');

  const sLabel = status==='approved'?'✓ Approved':status==='na'?'N/A':'Draft';
  const sBadgeClass = status==='approved'?'approved':status==='na'?'na':'draft';

  return `
    <div class="tpl-export-bar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="pol-back-btn" onclick="closePolicy()">← All Policies</button>
        <h2 style="margin:0">${p.title}</h2>
        <span class="pol-status-badge ${sBadgeClass}" style="font-size:11px">${sLabel}</span>
      </div>
      <div class="tpl-export-btns">
        <select class="poam-status-select" style="font-size:12px" onchange="savePolStatus('${p.id}',this.value);buildTemplatesView()">
          <option value="draft"${status==='draft'?' selected':''}>Draft</option>
          <option value="approved"${status==='approved'?' selected':''}>Approved</option>
          <option value="na"${status==='na'?' selected':''}>N/A</option>
        </select>
        <button class="tpl-btn primary" onclick="printPolicy('${p.id}')">🖨 Print / Export PDF</button>
      </div>
    </div>

    <div class="pol-doc">
      <!-- Domain + why callout -->
      <div style="background:${meta.color};padding:10px 22px;display:flex;align-items:center;gap:12px">
        <span style="background:rgba(255,255,255,.2);color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:4px;letter-spacing:.5px">${p.domain}</span>
        <span style="color:#fff;font-size:12px;flex:1"><strong>Why this policy matters:</strong> ${p.why}</span>
      </div>

      <!-- Meta fields -->
      <div class="pol-doc-meta">
        <div class="pol-meta-cell">
          <div class="pol-meta-label">Organization</div>
          <div class="pol-meta-val">${escHtml(orgName)}</div>
        </div>
        <div class="pol-meta-cell">
          <div class="pol-meta-label">Policy Version</div>
          <div class="pol-meta-val"><input type="text" value="${escHtml(polVer)}" oninput="savePolField('${p.id}','version',this.value)"></div>

      <!-- 4. Roles and Responsibilities -->

    <table style="width:100%;border-collapse:collapse;font-size:9pt">
      <thead><tr style="background:#f0f0f0"><th style="border:1px solid #ccc;padding:5px 8px;text-align:left;width:200px">Role</th><th style="border:1px solid #ccc;padding:5px 8px;text-align:left">Responsibility</th></tr></thead>
      <tbody>${roleRows}</tbody>
    </table>
    ${customNotes ? `<h2 style="font-size:11pt;border-bottom:1px solid #ccc;padding-bottom:4px;margin-top:16px">6. Organization Notes / Exceptions</h2><p style="font-size:9.5pt">${escHtml(customNotes)}</p>` : ''}
    <h2 style="font-size:11pt;border-bottom:1px solid #ccc;padding-bottom:4px;margin-top:16px">7. Approval</h2>
    <table style="width:100%;border-collapse:collapse;font-size:9pt">
      <tr>
        <td style="border:1px solid #ccc;padding:12px 16px;width:50%">
          <div style="font-weight:bold;font-size:8pt;color:#666;margin-bottom:20px">POLICY OWNER / ISSO</div>
          <div style="border-bottom:1px solid #666;margin-bottom:4px;height:20px"></div>
          <div style="font-size:8pt;color:#555">${escHtml(polReviewer)} &nbsp;·&nbsp; Date: ___________</div>
        </td>
        <td style="border:1px solid #ccc;padding:12px 16px;width:50%">
          <div style="font-weight:bold;font-size:8pt;color:#666;margin-bottom:20px">APPROVING AUTHORITY</div>
          <div style="border-bottom:1px solid #666;margin-bottom:4px;height:20px"></div>
          <div style="font-size:8pt;color:#555">${escHtml(polApprover)||'______________________'} &nbsp;·&nbsp; Date: ___________</div>
        </td>
      </tr>
    </table>`;

  openPrint(p.title+' — '+orgName, body);
}

function printAllPolicies() {
  const org     = getTplOrg();
  const orgName = org.orgName||'[Organization Name]';
  let allBody   = `<h1 style="font-size:18pt;margin-bottom:4px">CMMC Level 2 Policy Package</h1>
    <p style="font-size:10pt;color:#555;margin-bottom:24px">NIST SP 800-171 Rev 2 — ${escHtml(orgName)} — Generated: ${new Date().toLocaleDateString()}</p>`;

  POLICIES.forEach((p,i) => {
    const meta       = DOMAIN_META[p.domain]||{color:'#64748b'};
    const polVer     = getPolField(p.id,'version')||'1.0';
    const polDate    = getPolField(p.id,'date')||org.sspDate||'';
    const polReviewer= getPolField(p.id,'reviewer')||org.sysOwner||'';
    const polApprover= getPolField(p.id,'approver')||'';
    const customPurpose = getPolField(p.id,'purpose')||p.purpose.replace(/\[ORG NAME\]/g,orgName);
    const customScope   = getPolField(p.id,'scope')  ||p.scope.replace(/\[ORG NAME\]/g,orgName);
    const customNotes   = getPolField(p.id,'notes')  ||'';

    const reqItems = p.requirements.map(r=>`<li style="margin-bottom:4px">${r}</li>`).join('');
    const roleRows = p.roles.map(r=>`<tr>
      <td style="border:1px solid #ccc;padding:4px 8px;font-weight:600;font-size:8.5pt;vertical-align:top;width:180px">${r.role}</td>
      <td style="border:1px solid #ccc;padding:4px 8px;font-size:8.5pt">${r.responsibility}</td>
    </tr>`).join('');

    allBody += `<div style="page-break-before:${i>0?'always':'avoid'};padding-top:${i>0?'0':'0'}">
      <div style="border-bottom:3px solid ${meta.color};padding-bottom:6px;margin-bottom:12px">
        <h2 style="font-size:14pt;margin:0 0 2px">${p.title}</h2>
        <p style="margin:0;font-size:8.5pt;color:#555">Control Family ${p.domain} &nbsp;·&nbsp; ${orgName} &nbsp;·&nbsp; v${polVer} &nbsp;·&nbsp; ${polDate}</p>
      </div>
      <h3 style="font-size:10pt;border-bottom:1px solid #ddd;padding-bottom:2px">Purpose</h3>
      <p style="font-size:9pt">${escHtml(customPurpose)}</p>
      <h3 style="font-size:10pt;border-bottom:1px solid #ddd;padding-bottom:2px">Scope</h3>
      <p style="font-size:9pt">${escHtml(customScope)}</p>
      <h3 style="font-size:10pt;border-bottom:1px solid #ddd;padding-bottom:2px">Policy Requirements</h3>
      <ol style="font-size:9pt;line-height:1.5">${reqItems}</ol>
      <h3 style="font-size:10pt;border-bottom:1px solid #ddd;padding-bottom:2px">Roles &amp; Responsibilities</h3>
      <table style="width:100%;border-collapse:collapse;margin-bottom:8px">
        <thead><tr style="background:#f5f5f5"><th style="border:1px solid #ccc;padding:4px 8px;text-align:left;font-size:8.5pt">Role</th><th style="border:1px solid #ccc;padding:4px 8px;text-align:left;font-size:8.5pt">Responsibility</th></tr></thead>
        <tbody>${roleRows}</tbody>
      </table>
      ${customNotes ? `<h3 style="font-size:10pt">Notes / Exceptions</h3><p style="font-size:9pt">${escHtml(customNotes)}</p>` : ''}
      <table style="width:100%;border-collapse:collapse;margin-top:12px">
        <tr>
          <td style="border:1px solid #ccc;padding:10px 14px;width:50%">
            <div style="font-weight:bold;font-size:7.5pt;color:#666;margin-bottom:16px">POLICY OWNER / ISSO</div>
            <div style="border-bottom:1px solid #666;margin-bottom:3px;height:16px"></div>
            <div style="font-size:7.5pt;color:#555">${escHtml(polReviewer)||'______________________'} · Date: ___________</div>
          </td>
          <td style="border:1px solid #ccc;padding:10px 14px;width:50%">
            <div style="font-weight:bold;font-size:7.5pt;color:#666;margin-bottom:16px">APPROVING AUTHORITY</div>
            <div style="border-bottom:1px solid #666;margin-bottom:3px;height:16px"></div>
            <div style="font-size:7.5pt;color:#555">${escHtml(polApprover)||'______________________'} · Date: ___________</div>
          </td>
        </tr>
      </table>
    </div>`;
  });

  openPrint('CMMC Policy Package — '+orgName, allBody);
}
